async function loadLocationLog() {
  const el = document.getElementById('logList');
  if (!el || !groupId) return;
  const logTitleEl = document.getElementById('logTitleEl');
  if (logTitleEl) logTitleEl.textContent = t('logTitle');
  el.innerHTML = '<div style="text-align:center;padding:12px;color:var(--text2)">⏳</div>';
  const picker2 = document.getElementById('metDatePicker');
  const today = (picker2?.value) || new Date().toISOString().slice(0,10);
  const selectedDate = today;
  const nowTs = Date.now();

  // ── Helpers ──
  const fmt = ts => new Date(ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  const durStr = ms => {
    const m = Math.round(ms/60000);
    if (m < 60) return `${m} ד'`;
    return `${Math.floor(m/60)}ש' ${m%60}ד'`;
  };
  const motionIcon = m => ({ still:'🔵', walking:'🚶', cycling:'🚴', driving:'🚗' }[m] || '⚫');
  const MKEYS = {still:'motionStill',walking:'motionWalk',cycling:'motionCycle',driving:'motionDrive'};
  const motionLbl  = m => t(MKEYS[m]) || m;

  // Helper: find nearest saved point within 20m — use its name as address
  const nearestPoint = (lat, lng) => {
    for (const p of points) {
      if (haversine(lat, lng, p.lat, p.lng) <= 20) return p.name;
    }
    return null;
  };

  // Reverse geocode via OSM (cached)
  const addrCache = {};
  const getAddr = async (lat, lng) => {
    // Check saved points first — most accurate for familiar places
    const ptName = nearestPoint(lat, lng);
    if (ptName) return '📍 ' + ptName;

    const key = `${lat.toFixed(3)},${lng.toFixed(3)}`;
    if (addrCache[key]) return addrCache[key];
    try {
      const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&zoom=18&addressdetails=1`,
        { headers: {'Accept-Language': lang} });
      if (r.ok) {
        const j = await r.json();
        const parts = j.address;
        // Israeli address format: street name + house number + city
        const street = parts?.road || parts?.pedestrian || parts?.footway || parts?.residential || '';
        const num    = parts?.house_number || '';
        const city   = parts?.city || parts?.town || parts?.village || parts?.suburb || '';
        const addr   = [street, num, city].filter(Boolean).join(' ');
        addrCache[key] = addr || `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
      }
    } catch(e) { addrCache[key] = `${lat.toFixed(4)}, ${lng.toFixed(4)}`; }
    return addrCache[key] || `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
  };

  // Show member selector for admin — includes all groups where user is admin
  const isAdmin = Object.values(allGroupsData).some(gd => gd.adminUid === me?.uid)
    || groupData?.adminUid === me?.uid;
  const allAdminMembers = [...new Set(
    Object.values(allGroupsData)
      .filter(gd => gd.adminUid === me?.uid)
      .flatMap(gd => gd.members || [])
  )];
  const logBar = document.getElementById('logMemberBar');
  const logSel = document.getElementById('logMemberSel');
  const logLbl = document.getElementById('logMemberLbl');
  if (isAdmin && logBar && logSel) {
    logBar.style.display = 'flex';
    if (logLbl) logLbl.textContent = t('logMember');
    const memberList = allAdminMembers.length ? allAdminMembers : (groupData?.members || []);
    logSel.innerHTML = `<option value="">${t('dmAll')}</option>`;
    memberList.forEach(uid => {
      const name = members[uid]?.name || (uid === me?.uid ? (myProfile?.name || me?.email) : uid.slice(0,8));
      logSel.innerHTML += `<option value="${uid}">${esc(name)}</option>`;
    });
    logSel.value = logViewUid || '';
  } else if (logBar) {
    logBar.style.display = 'none';
  }

  try {
    const memberList = allAdminMembers.length ? allAdminMembers : (groupData?.members || [me.uid]);
    const uidsToLoad = isAdmin
      ? (logViewUid ? [logViewUid] : memberList)
      : [me.uid];
    const trackDocs = await Promise.all(
      uidsToLoad.map(uid => db.collection('tracks').doc(`${groupId}_${uid}_${selectedDate}`).get())
    );

    el.innerHTML = '';
    let hasData = false;

    for (let i = 0; i < trackDocs.length; i++) {
      const doc = trackDocs[i];
      const uid = uidsToLoad[i];
      let rawPts = (doc.exists && doc.data().points?.length) ? [...doc.data().points] : [];
      // Merge local trackPoints for today (current user only)
      if (uid === me.uid && selectedDate === today) {
        const savedTs = new Set(rawPts.map(p => p.ts));
        const localNew = trackPoints.filter(p => !savedTs.has(p.ts));
        rawPts = [...rawPts, ...localNew];
      }
      rawPts.sort((a,b) => a.ts - b.ts);
      if (rawPts.length < 2) continue;
      hasData = true;
      const name = doc.data().name || uid.slice(0,6);
      const color = colorForUid(uid);
      const isMe = uid === me.uid;

      // ── Location-based segmentation: group consecutive points within 25m of anchor ──
      // Merges GPS jitter — same location = one row with start→end time
      const SAME_LOC_M = 25;
      const MIN_DUR_MS = 60000; // skip segments < 1 min
      const segs = [];
      let anchorPt = rawPts[0];
      let segStartIdx = 0;

      const pushSeg = (startIdx, endIdx) => {
        const durationMs = rawPts[endIdx].ts - rawPts[startIdx].ts;
        if (durationMs < MIN_DUR_MS) return;
        const slice = rawPts.slice(startIdx, endIdx + 1);
        const cnt = {};
        slice.forEach(p => { const m = p.motion || 'still'; cnt[m] = (cnt[m]||0) + 1; });
        const dom = Object.entries(cnt).sort((a,b) => b[1]-a[1])[0][0];
        segs.push({
          motion: dom,
          startTs: rawPts[startIdx].ts,
          endTs: rawPts[endIdx].ts,
          lat: anchorPt.lat, lng: anchorPt.lng,
          isOngoing: Date.now() - rawPts[endIdx].ts < 300000
        });
      };

      for (let j = 1; j < rawPts.length; j++) {
        const dist = haversine(anchorPt.lat, anchorPt.lng, rawPts[j].lat, rawPts[j].lng);
        if (dist > SAME_LOC_M) {
          pushSeg(segStartIdx, j - 1);
          anchorPt = rawPts[j];
          segStartIdx = j;
        }
      }
      pushSeg(segStartIdx, rawPts.length - 1);

      // Build HTML rows with addresses
      const rowsHtml = [];
      for (const seg of segs) {
        const isNow = seg.isOngoing;
        const endStr = isNow ? t('now') : fmt(seg.endTs);
        const dur = durStr(seg.endTs - seg.startTs);
        const addr = await getAddr(seg.lat, seg.lng);
        const ico = motionIcon(seg.motion);
        const lbl = motionLbl(seg.motion);
        rowsHtml.push(`
          <tr style="border-top:1px solid var(--border);cursor:pointer" onclick="switchTab('map');flyToPoint(${seg.lat},${seg.lng})">
            <td style="padding:9px 12px;font-weight:600;white-space:nowrap;direction:ltr;text-align:left">${fmt(seg.startTs)} – ${endStr}</td>
            <td style="padding:9px 12px">${ico} ${lbl}</td>
            <td style="padding:9px 12px;color:var(--text2);white-space:nowrap">${dur}</td>
            <td style="padding:9px 12px;font-size:11px;color:var(--text2);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(addr)}</td>
          </tr>`);
      }

      if (!rowsHtml.length) continue;

      el.innerHTML += `
        <div style="margin-bottom:14px">
          ${isAdmin && !isMe ? `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <div style="width:28px;height:28px;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff">${initials(name)}</div>
            <span style="font-weight:700;font-size:14px">${esc(name)}</span>
          </div>` : ''}
          <div style="background:var(--card);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);overflow-x:auto">
            <table style="width:100%;border-collapse:collapse;font-size:12px">
              <thead><tr style="background:var(--bg3)">
                <th style="padding:8px 12px;text-align:right;font-weight:700;color:var(--text2)">זמן</th>
                <th style="padding:8px 12px;text-align:right;font-weight:700;color:var(--text2)">פעילות</th>
                <th style="padding:8px 12px;text-align:right;font-weight:700;color:var(--text2)">משך</th>
                <th style="padding:8px 12px;text-align:right;font-weight:700;color:var(--text2)">מיקום</th>
              </tr></thead>
              <tbody>${rowsHtml.join('')}</tbody>
            </table>
          </div>
        </div>`;
    }

    if (!hasData || !el.innerHTML.includes('<table')) {
      el.innerHTML = `<div class="empty"><div class="ei">📌</div><div class="et">${t('logNoData')}</div></div>`;
    }
  } catch(e) {
    el.innerHTML = `<div style="padding:12px;color:var(--red)">${e.message}</div>`;
  }
}

// ── Daily Route ──
let routeLayer = null;

async function showDailyRoute(uid, name, color) {
  // Clear previous route
  if (routeLayer) { mapObj.removeLayer(routeLayer); routeLayer = null; }
  const today = new Date().toISOString().slice(0,10);
  const docId = `${groupId}_${uid}_${today}`;
  try {
    const doc = await db.collection('tracks').doc(docId).get();
    if (!doc.exists || !doc.data().points?.length) {
      showToast(t('routeNoData'), 'err'); return;
    }
    const pts = doc.data().points.sort((a,b) => a.ts - b.ts);
    if (pts.length < 2) { showToast(t('routeNoData'), 'err'); return; }
    routeLayer = L.layerGroup().addTo(mapObj);
    // Color per motion type
    const motionColors = { still:'#546e7a', walking:'#34a853', cycling:'#fbbc04', driving:'#ea4335' };
    // Draw polyline segments colored by motion
    for (let i = 1; i < pts.length; i++) {
      const c = motionColors[pts[i].motion] || '#1a73e8';
      L.polyline([[pts[i-1].lat, pts[i-1].lng],[pts[i].lat, pts[i].lng]],
        {color:c, weight:4, opacity:.8}).addTo(routeLayer);
    }
    // Find stop points (stayed >2min at same location)
    let stopN = 0;
    const stops = [];
    let runStart = 0;
    for (let i = 1; i < pts.length; i++) {
      const d = haversine(pts[runStart].lat, pts[runStart].lng, pts[i].lat, pts[i].lng);
      const dt = pts[i].ts - pts[runStart].ts;
      if (d > 80 || i === pts.length-1) {
        if (dt > 120000) { // stayed > 2min
          stops.push({...pts[runStart], n: ++stopN, motion: pts[runStart].motion,
            duration: Math.round(dt/60000)});
        }
        runStart = i;
      }
    }
    // Draw numbered stop markers
    stops.forEach(s => {
      const mico = MOTION_EMOJI[s.motion] || '';
      const icon = L.divIcon({
        className:'', iconSize:[24,24], iconAnchor:[12,12],
        html:`<div class="route-stop-marker">${s.n}</div>`
      });
      const ts = new Date(s.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      L.marker([s.lat,s.lng],{icon}).addTo(routeLayer)
        .bindPopup(`<b>${t('routeStop')} ${s.n}</b>${mico}<br>${ts} · ${s.duration} ${t('logMins')}`);
    });
    // Start/end markers
    L.circleMarker([pts[0].lat,pts[0].lng],{radius:8,color:'#34a853',fillColor:'#34a853',fillOpacity:1,weight:2})
      .addTo(routeLayer).bindPopup('🟢 ' + new Date(pts[0].ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}));
    L.circleMarker([pts[pts.length-1].lat,pts[pts.length-1].lng],{radius:8,color:'#ea4335',fillColor:'#ea4335',fillOpacity:1,weight:2})
      .addTo(routeLayer).bindPopup('🔴 ' + new Date(pts[pts.length-1].ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}));
    // Fit map to route
    const latlngs = pts.map(p => [p.lat, p.lng]);
    mapObj.fitBounds(L.latLngBounds(latlngs).pad(0.15));
    switchTab('map');
    showToast(`🗺️ ${name} · ${stops.length} ${t('routeStop').toLowerCase()}`, 'ok', 6000);
  } catch(e) { showToast(e.message, 'err'); }
}

// ══════════════════════════════════════════════
// ══════════════════════════════════════════════
//  AUTO-UPDATE: fetch version from GitHub, reload if newer
// ══════════════════════════════════════════════
async function checkForUpdate() {
  try {
    const resp = await fetch(
      'https://raw.githubusercontent.com/dimitryu/location/main/index.html',
      { cache: 'no-cache', signal: AbortSignal.timeout(10000) }
    );
    if (!resp.ok) return;
    const html = await resp.text();
    const m = html.match(/APP_VERSION\s*=\s*"([^"]+)"/);
    if (!m) return;
    const latest = m[1];
    if (latest === APP_VERSION) return;
    // Newer version — purge ALL SW caches then hard-reload
    showToast(`🆕 גרסה ${latest} — מעדכן...`, 'ok', 5000);
    try {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
      const reg = await navigator.serviceWorker?.getRegistration();
      if (reg) await reg.update().catch(() => {});
    } catch(e) {}
    setTimeout(() => location.replace(location.href.split('?')[0] + '?v=' + latest), 3000);
  } catch(e) { /* network error — skip silently */ }
}

// ══════════════════════════════════════════════
//  PERIODIC BACKGROUND SYNC (installed PWA only)
// ══════════════════════════════════════════════
async function registerPeriodicSync(reg) {
  if (!('periodicSync' in reg)) return;
  try {
    const status = await navigator.permissions.query({ name: 'periodic-background-sync' });
    if (status.state !== 'granted') return;
    await reg.periodicSync.register('location-update', { minInterval: 60 * 1000 });
  } catch(e) {}
}

//  SOS

function triggerSOS() {
  if (!me || !groupId) return;
  // Cancel if already active
  if (sosActive) { cancelSOS(); return; }
  // Double-tap protection: first tap arms, second tap within 3s fires
  if (sosTapCount === 0) {
    sosTapCount = 1;
    const ring = document.getElementById('sosRing');
    if (ring) ring.hidden = false;
    showToast(t('sosTapConfirm'), 'err');
    sosTapTimer = setTimeout(() => {
      sosTapCount = 0;
      if (ring) ring.hidden = true;
    }, 3000);
    return;
  }
  // Second tap — actually send
  clearTimeout(sosTapTimer);
  sosTapCount = 0;
  const ring = document.getElementById('sosRing');
  if (ring) ring.hidden = true;
  sosActive = true;
  document.getElementById('tp-map')?.classList.add('sos-active');
  const sosFab = document.getElementById('sosFab');
  if (sosFab) sosFab.title = t('sosActive');
  const myName = myProfile?.name || me.email;
  db.collection('groups').doc(groupId).collection('sos').add({
    uid: me.uid, name: myName,
    lat: myLat, lng: myLng,
    ts: firebase.firestore.FieldValue.serverTimestamp(),
    active: true
  }).catch(()=>{});
  // Write SOS to group doc so ALL members see it via their existing group subscription
  db.collection('groups').doc(groupId).update({
    sosActive: true, sosUid: me.uid, sosName: myName,
    sosTs: firebase.firestore.FieldValue.serverTimestamp()
  }).catch(()=>{});
  saveGroupNotification('sos', myName, `🆘 SOS — ${myName}`, null);
  showToastLong(t('sosSent'), 'err');
}

function cancelSOS() {
  sosActive = false;
  document.getElementById('tp-map')?.classList.remove('sos-active');
  const sosFab = document.getElementById('sosFab');
  if (sosFab) sosFab.title = '';
  db.collection('groups').doc(groupId).collection('sos')
    .where('uid','==',me.uid).where('active','==',true).get()
    .then(snap => snap.docs.forEach(d => d.ref.update({active:false})))
    .catch(()=>{});
  db.collection('groups').doc(groupId).update({ sosActive: false }).catch(()=>{});
  showToast(t('sosCancel'), 'ok');
}

function subSOS() {
  // Unsub all previous SOS listeners
  sosUnsubs.forEach(fn => fn()); sosUnsubs = [];
  if (unsubSOS) { unsubSOS(); unsubSOS = null; }

  const gids = Object.keys(allGroupsData).length > 0 ? Object.keys(allGroupsData) : (groupId ? [groupId] : []);
  if (!gids.length) return;

  gids.forEach(gid => {
    const unsub = db.collection('groups').doc(gid).collection('sos')
      .where('active','==',true)
      .onSnapshot(snap => {
        snap.docChanges().forEach(change => {
          const docId = gid + '_' + change.doc.id;
          const d = change.doc.data();
          if (change.type === 'removed' || (change.type === 'modified' && !d.active)) {
            delete activeSosBanners[docId];
            // If this was MY SOS being cancelled by someone else — sync local state
            if (d.uid === me?.uid) { sosActive = false; document.getElementById('tp-map')?.classList.remove('sos-active'); }
            updateSOSBanner();
            return;
          }
          if (change.type !== 'added') return;
          const isMine = d.uid === me?.uid;
          activeSosBanners[docId] = { name: d.name, uid: d.uid, isMine };
          updateSOSBanner();
          if (!isMine) {
            playSOSAlert();
            if (Notification.permission === 'granted') {
              new Notification('🆘 SOS!', { body: `${d.name} צריך/ה עזרה!`, icon: './icon.svg' });
            }
            if (mapObj && d.lat && d.lng) {
              const icon = L.divIcon({ className:'', iconSize:[46,46], iconAnchor:[23,23], html:`<div class="sos-marker">🆘</div>` });
              L.marker([d.lat, d.lng], {icon}).addTo(mapObj).bindPopup(`<b>🆘 SOS</b><br>${esc(d.name)}`).openPopup();
            }
          }
        });
        // Rebuild full banner state from snapshot
        const prev = Object.keys(activeSosBanners).filter(k => k.startsWith(gid + '_'));
        prev.forEach(k => delete activeSosBanners[k]);
        snap.docs.forEach(doc => {
          const d = doc.data();
          if (d.active) {
            activeSosBanners[gid + '_' + doc.id] = { name: d.name, uid: d.uid, isMine: d.uid === me?.uid };
          }
        });
        updateSOSBanner();
      });
    sosUnsubs.push(unsub);
  });
  unsubSOS = () => { sosUnsubs.forEach(fn => fn()); sosUnsubs = []; };
}

function subGroupEvents() {
  groupEventUnsubs.forEach(fn => fn()); groupEventUnsubs = [];
  const gids = Object.keys(allGroupsData).length > 0 ? Object.keys(allGroupsData) : (groupId ? [groupId] : []);
  if (!gids.length) return;
  gids.forEach(gid => {
    const unsub = db.collection('groups').doc(gid).collection('groupEvents')
      .orderBy('ts', 'desc').limit(20)
      .onSnapshot(snap => {
        snap.docChanges().forEach(change => {
          if (change.type !== 'added') return;
          const d = change.doc.data();
          if (d.uid === me?.uid) return; // don't notify self
          const ts = d.ts?.toDate ? d.ts.toDate() : new Date();
          if (Date.now() - ts.getTime() > 60000) return; // only show events < 1 min old
          if (d.type === 'arrival') {
            const msg = `📍 ${esc(d.name)} — ${t('arriveAt')}: ${esc(d.pointName)}`;
            showToastLong(msg, 'ok');
            if (Notification.permission === 'granted') {
              new Notification('📍 Family Location', { body: msg, icon: './icon.svg' });
            }
          }
        });
      });
    groupEventUnsubs.push(unsub);
  });
}

function playSOSAlert() {
  // Vibrate 10 seconds pattern
  if (navigator.vibrate) navigator.vibrate([400,150,400,150,400,150,400,150,400,150,400,150,400,150,400,150,400,150,400]);
  // Beeping sound via Web Audio API — 10 seconds (20 beeps × 0.5s)
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    for (let i = 0; i < 20; i++) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'square';
      osc.frequency.value = i % 2 === 0 ? 880 : 660;
      gain.gain.setValueAtTime(0.4, ctx.currentTime + i * 0.5);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.5 + 0.45);
      osc.start(ctx.currentTime + i * 0.5);
      osc.stop(ctx.currentTime + i * 0.5 + 0.45);
    }
  } catch(e) {}
}

function updateSOSBanner() {
  const banner = document.getElementById('sos-banner');
  const content = document.getElementById('sosBannerContent');
  if (!banner || !content) return;
  const entries = Object.values(activeSosBanners);
  if (entries.length === 0 && !sosActive) {
    banner.classList.remove('active');
    content.innerHTML = '';
    return;
  }
  banner.classList.add('active');
  let html = entries.map(e =>
    e.isMine
      ? `<span style="opacity:.85">${t('sosYouSent')}</span>`
      : `<span>🆘 <b>${esc(e.name)}</b> צריך/ה עזרה!</span>`
  ).join(' · ');
  if (sosActive && !entries.some(e => e.isMine)) {
    html += `<span style="opacity:.85"> · ${t('sosYouSent')}</span>`;
  }
  // No dismiss button — banner stays until SOS is cancelled in Firestore
  content.innerHTML = html;
}

function subChat() {

  unsubChat = db.collection('groups').doc(groupId).collection('chat')
    .orderBy('ts','asc').limitToLast(100)
    .onSnapshot(snap => {
      snap.docChanges().forEach(change => {

          // Count unread only for messages visible to me
          const visibleToMe = !d.toUid || d.toUid === me.uid || d.uid === me.uid;
          if (d.uid !== me.uid && visibleToMe) {
            const isChatActive = document.getElementById('tp-chat')?.classList.contains('on');
            if (!isChatActive) { unreadChat++; updateChatBadge(); }

      renderChatMessages(snap.docs.map(d => ({id:d.id,...d.data()})));

function updateChatToSelector() {
  const sel = document.getElementById('chatToSel');
  if (!sel) return;
  sel.innerHTML = `<option value="">${t('dmAll')}</option>`;
  const allUids = new Set();
  Object.values(allGroupsData).forEach(gd => (gd.members || []).forEach(uid => allUids.add(uid)));
  if (groupData?.members) groupData.members.forEach(uid => allUids.add(uid));
  allUids.delete(me?.uid);
  allUids.forEach(uid => {
    const name = members[uid]?.name || uid.slice(0,8);
    sel.innerHTML += `<option value="${uid}">${esc(name)}</option>`;
  });
  sel.value = chatToUid || '';

function renderChatMessages(msgs) {
  const el = document.getElementById('chatMsgs');
  if (!el) return;
  el.innerHTML = msgs.filter(m => {
    // Show: broadcast (no toUid), sent by me, or sent to me
    if (!m.toUid) return true;
    return m.uid === me.uid || m.toUid === me.uid;
  }).map(m => {
    const isMine = m.uid === me.uid;
    const isSOS  = m.type === 'sos';
    const isDM   = !!m.toUid;
    const ts = m.ts?.toDate ? m.ts.toDate().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '';
    const dmClass = isDM ? ' msg-dm' : '';
    const cls = isSOS ? 'msg-bubble msg-sos' : isMine ? `msg-bubble msg-mine${dmClass}` : `msg-bubble msg-theirs${dmClass}`;
    const dmBadge = isDM ? `<div class="msg-dm-badge">${t('dmLabel')} ${isMine ? '→ '+esc(members[m.toUid]?.name||'') : ''}</div>` : '';
    return `<div class="${cls}">
      ${!isMine && !isSOS ? `<div class="msg-name">${esc(m.name||'')}</div>` : ''}
      ${dmBadge}
      ${esc(m.text||'')}
      <div class="msg-time">${ts}</div>
    </div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

async function sendChatMsg() {

async function initBattery() {

    myBattery = await navigator.getBattery();
    myBattery.addEventListener('levelchange', () => {
      if (myLat) pushLocation(myLat, myLng, currentMotion);
      checkBatteryLowAlert();
    });
    lastBatteryAlertPct = getBatteryPct() ?? 100;
  } catch(e) {}
}

function checkBatteryLowAlert() {
  const pct = getBatteryPct();
  if (pct === null) return;
  if (pct <= 10 && lastBatteryAlertPct > 10 && groupId) {
    const myName = myProfile?.name || me?.email || '?';
    const msg = `🔋 ${myName} — ${t('battLow')} (${pct}%)`;
    showToastLong(msg, 'err');
    saveGroupNotification('batteryLow', myName, msg, null);
    if (groupData?.adminUid && groupData.adminUid !== me.uid) {
      db.collection('adminNotifs').add({
        groupId, adminUid: groupData.adminUid,
        type: 'batteryLow', memberUid: me.uid,
        memberName: myName, battery: pct,
        ts: firebase.firestore.FieldValue.serverTimestamp(), seen: false
      }).catch(()=>{});
    }
  }
  lastBatteryAlertPct = pct;
}

function getBatteryPct() {
  return myBattery ? Math.round(myBattery.level * 100) : null;
}

function notifySpeedAlert(speed) {
  const now = Date.now();
  if (now - lastSpeedAlert < 60000) return;
  lastSpeedAlert = now;
  const kmh = Math.round(speed * 3.6);
  const myName = myProfile?.name || me.email;
  showToastLong(`🚨 ${t('speedAlert')} · ${kmh} km/h`, 'err');
  saveGroupNotification('speed', myName, `🚨 ${myName} — ${t('speedAlert')} (${kmh} km/h)`, null);
  if (groupData?.adminUid && groupData.adminUid !== me.uid) {
    db.collection('adminNotifs').add({
      groupId, adminUid: groupData.adminUid,
      type: 'speed', memberUid: me.uid,
      memberName: myName,
      speed: kmh, lat: myLat, lng: myLng,
      ts: firebase.firestore.FieldValue.serverTimestamp(),
      seen: false
    }).catch(()=>{});
  }
}

function onLogMemberChange(uid) {
  logViewUid = uid || null;
  loadLocationLog();
}

// ══════════════════════════════════════════════
//  7-DAY HISTORY NAVIGATION
// ══════════════════════════════════════════════
function shiftMetricsDate(days) {
  const picker = document.getElementById('metDatePicker');
  if (!picker) return;
  const current = picker.value || new Date().toISOString().slice(0,10);
  const d = new Date(current);
  d.setDate(d.getDate() + days);
  const newDate = d.toISOString().slice(0,10);
  const today = new Date().toISOString().slice(0,10);
  if (newDate > today) return;
  picker.value = newDate;
  loadMetrics();
}

// ══════════════════════════════════════════════
//  OFFLINE CACHE
// ══════════════════════════════════════════════
function cacheMembers() {
  if (!groupId || !Object.keys(members).length) return;
  try { localStorage.setItem(`fl_members_${groupId}`, JSON.stringify(members)); } catch(e) {}
}

function loadCachedMembers() {
  if (!groupId) return;
  try {
    const raw = localStorage.getItem(`fl_members_${groupId}`);
    if (raw) Object.assign(members, JSON.parse(raw));
  } catch(e) {}
}

document.addEventListener('DOMContentLoaded', () => {
  const savedLang = localStorage.getItem('lang') || 'he';
  lang = savedLang;
  document.documentElement.setAttribute('lang', savedLang);
  document.documentElement.setAttribute('dir', savedLang==='he'?'rtl':'ltr');
  renderUI();
  initFirebase();
  initInstallPrompt();
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => registerPeriodicSync(reg))
      .catch(() => {});
    // Listen for SW-initiated location requests (Periodic Background Sync)
    navigator.serviceWorker.addEventListener('message', e => {
      if (e.data?.type === 'SW_REQUEST_LOCATION') {
        if (myLat !== null) {
          pushLocation(myLat, myLng, currentMotion);
        } else {
          navigator.geolocation?.getCurrentPosition(onPosition, onPosErr,
            { enableHighAccuracy: false, maximumAge: 60000, timeout: 10000 });
        }
      }
    });
  }
});
</script>
