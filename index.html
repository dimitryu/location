<script>

  const t=localStorage.getItem('theme');
  const d=window.matchMedia('(prefers-color-scheme:dark)').matches;
  document.documentElement.setAttribute('data-theme',t||(d?'dark':'light'));

<style>
/* ════════════ VARIABLES ════════════ */
:root{
  --primary:#1a73e8; --primary-d:#1557b0;
  --green:#34a853; --red:#ea4335; --yellow:#fbbc04;
  --bg:#f1f3f4; --bg2:#ffffff; --bg3:#e8eaed;
  --text:#202124; --text2:#5f6368;
  --border:#dadce0; --card:#ffffff;
  --shadow:0 2px 10px rgba(0,0,0,.12);
  --nav:64px; --hdr:56px;
  --radius:14px;
}
[data-theme="dark"]{
  --bg:#0f0f0f; --bg2:#1c1c1e; --bg3:#2c2c2e;
  --text:#f5f5f7; --text2:#8e8e93;
  --border:#3a3a3c; --card:#1c1c1e;
  --shadow:0 2px 10px rgba(0,0,0,.5);
}
/* ════════════ BASE ════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Heebo',-apple-system,sans-serif;background:var(--bg);color:var(--text)}
[hidden]{display:none!important}
button{font-family:inherit;cursor:pointer}

/* ════════════ LOADING ════════════ */
#vLoading{
  position:fixed;inset:0;
  background:linear-gradient(135deg,#1a73e8,#0d47a1);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;transition:opacity .5s;
}
.ll{font-size:80px;animation:bounce 1.8s ease-in-out infinite}
.lt{color:#fff;font-size:28px;font-weight:900;margin-top:16px}
.ls{color:rgba(255,255,255,.7);font-size:14px;margin-top:8px}
.lver{color:rgba(255,255,255,.4);font-size:11px;font-weight:800;margin-top:8px;letter-spacing:1px}
.lsp{width:38px;height:38px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin-top:28px}
@keyframes bounce{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-14px) rotate(4deg)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ════════════ AUTH ════════════ */
#vAuth{
  position:fixed;inset:0;overflow-y:auto;
  background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;
}
.al{font-size:64px;margin-bottom:12px}
.at{font-size:26px;font-weight:900;text-align:center}
.as{font-size:14px;color:var(--text2);text-align:center;margin:8px 0 28px}
.acard{background:var(--card);border-radius:var(--radius);padding:22px;width:100%;max-width:400px;box-shadow:var(--shadow)}
.atabs{display:flex;background:var(--bg3);border-radius:10px;overflow:hidden;margin-bottom:18px}
.atab{flex:1;padding:10px;text-align:center;cursor:pointer;font-weight:700;font-size:14px;transition:background .2s}
.atab.on{background:var(--primary);color:#fff}

/* ════════════ FORMS ════════════ */
.fg{margin-bottom:14px}
.fl{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px;display:block}
.fi{
  width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;
  font-size:15px;font-family:inherit;background:var(--bg);color:var(--text);
  direction:inherit;transition:border-color .2s;
}
.fi:focus{outline:none;border-color:var(--primary)}

/* ════════════ BUTTONS ════════════ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 18px;border:none;border-radius:10px;font-size:15px;font-weight:700;
  font-family:inherit;cursor:pointer;transition:opacity .15s,transform .1s;width:100%;
}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-p{background:var(--primary);color:#fff}
.btn-s{background:var(--bg3);color:var(--text)}
.btn-r{background:var(--red);color:#fff}
.btn-g{background:var(--green);color:#fff}
.btn-sm{padding:8px 14px;font-size:13px;width:auto}
.btn-ico{padding:10px;width:40px;height:40px;border-radius:50%}
.mt16{margin-top:16px}

/* ════════════ APP SHELL ════════════ */
#vApp{position:fixed;inset:0;display:flex;flex-direction:column}
.hdr{
  height:var(--hdr);background:var(--card);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;
  box-shadow:var(--shadow);z-index:200;
  padding-top:env(safe-area-inset-top);
}
.hdr-title{flex:1;font-size:18px;font-weight:900}
.hdr-ver{font-size:10px;opacity:.4;font-weight:800}

/* ════════════ TAB CONTENT ════════════ */
.tc{flex:1;overflow:hidden;position:relative}
.tp{position:absolute;inset:0;overflow-y:auto;display:none}
.tp.on{display:block}

/* ════════════ BOTTOM NAV ════════════ */
#bnav{
  height:var(--nav);background:var(--card);border-top:1px solid var(--border);
  display:flex;align-items:center;flex-shrink:0;
  padding-bottom:env(safe-area-inset-bottom);
}
.nb{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;padding:8px;cursor:pointer;background:none;border:none;font-family:inherit;
}
.nb.on .ni{filter:none}
.nb.on .nl{color:var(--primary);font-weight:700}
.ni{font-size:22px}
.nl{font-size:10px;color:var(--text2)}

/* ════════════ MAP ════════════ */
#tp-map{padding:0}
#map{width:100%;height:100%}
.m-priv{
  position:absolute;top:12px;right:12px;z-index:1000;
  background:var(--card);border:none;border-radius:10px;padding:8px 14px;
  font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;
  box-shadow:var(--shadow);display:flex;align-items:center;gap:6px;color:var(--text);
}
.m-priv.hid{background:var(--red);color:#fff}
/* ── INSTALL BANNER (with custom icon) ── */
#installBanner{
  position:fixed;bottom:calc(var(--nav) + 12px);left:12px;right:12px;
  background:linear-gradient(135deg,#1565c0,#1976d2);color:#fff;
  border-radius:16px;padding:12px 14px;display:none;
  align-items:center;gap:12px;z-index:3001;
  box-shadow:0 4px 20px rgba(25,118,210,.4);
  animation:slideUp .4s ease;
}
.ib-icon{
  width:48px;height:48px;border-radius:12px;flex-shrink:0;overflow:hidden;
  background:#fff;display:flex;align-items:center;justify-content:center;
}
.ib-icon img{width:44px;height:44px;border-radius:10px;object-fit:cover}
.ib-txt{flex:1;min-width:0}
.ib-txt strong{font-size:14px;display:block;font-weight:800}
.ib-txt span{font-size:11px;opacity:.85}
.ib-yes{padding:8px 16px;background:#fff;color:#1565c0;border:none;border-radius:10px;font-weight:800;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap}
.ib-no{padding:8px 10px;background:rgba(255,255,255,.2);border:none;border-radius:10px;color:#fff;font-size:13px;cursor:pointer}
/* Map FAB buttons — bottom LEFT, above zoom */
.map-fabs{position:absolute;bottom:160px;left:14px;z-index:1000;display:flex;flex-direction:column;gap:8px}
.map-fab-btn{
  width:46px;height:46px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:20px;
  box-shadow:0 3px 12px rgba(0,0,0,.25);font-family:inherit;
}
.map-fab-center{background:var(--primary);color:#fff}
.map-fab-add{background:var(--green);color:#fff;font-size:26px;font-weight:900}
/* Leaflet zoom bottom-left */
.leaflet-top.leaflet-left{display:none}
.leaflet-bottom.leaflet-right .leaflet-control-zoom{display:none}
.leaflet-bottom.leaflet-left .leaflet-control-zoom{margin-bottom:100px;margin-left:14px}
.add-hint{
  position:absolute;bottom:80px;left:50%;transform:translateX(-50%);z-index:1000;
  background:rgba(0,0,0,.75);color:#fff;padding:10px 20px;border-radius:20px;
  font-size:14px;font-weight:700;white-space:nowrap;
  display:flex;align-items:center;gap:8px;
}
.add-hint button{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:4px 10px;font-family:inherit;font-size:12px;cursor:pointer}
/* Member marker */
.mm{
  border:3px solid #fff;border-radius:50%;width:44px;height:44px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:900;color:#fff;
  box-shadow:0 2px 8px rgba(0,0,0,.35);cursor:pointer;position:relative;
}
.mm-motion{
  position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);
  font-size:13px;background:#fff;border-radius:10px;padding:0 3px;
  box-shadow:0 1px 4px rgba(0,0,0,.3);line-height:18px;
}
/* Metrics tab */
.metric-card{
  background:var(--card);border-radius:var(--radius);padding:16px;
  margin-bottom:10px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px;
}
.metric-av{
  width:48px;height:48px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:17px;font-weight:900;color:#fff;flex-shrink:0;
}
.metric-name{font-size:15px;font-weight:700}
.metric-row{display:flex;gap:16px;margin-top:6px;flex-wrap:wrap}
.metric-val{font-size:13px;color:var(--text2)}
.metric-val b{color:var(--text);font-size:15px}
.metric-btns{display:flex;gap:6px;margin-top:8px}
/* Log entry */
.log-entry{
  background:var(--card);border-radius:12px;padding:12px 14px;
  margin-bottom:8px;box-shadow:var(--shadow);
  display:flex;align-items:flex-start;gap:12px;
}
.log-dot{width:10px;height:10px;border-radius:50%;background:var(--primary);margin-top:4px;flex-shrink:0}
.log-addr{font-size:14px;font-weight:600}
.log-time{font-size:12px;color:var(--text2);margin-top:3px}
/* Route legend */
.route-stop-marker{
  background:var(--primary);color:#fff;border-radius:50%;
  width:24px;height:24px;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:900;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3);
}
/* Member selector on map */
.m-sel{
  position:absolute;top:12px;left:12px;z-index:1001;
}
.m-sel-btn{
  background:var(--card);border:none;border-radius:10px;padding:8px 12px;
  font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;
  box-shadow:var(--shadow);display:flex;align-items:center;gap:6px;color:var(--text);
}
.m-sel-drop{
  position:absolute;top:44px;left:0;background:var(--card);
  border-radius:12px;box-shadow:var(--shadow);min-width:160px;overflow:hidden;
  display:none;
}
.m-sel-drop.open{display:block}
.m-sel-item{
  display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;
  font-size:13px;font-weight:600;border-bottom:1px solid var(--border);
}
.m-sel-item:last-child{border-bottom:none}
.m-sel-item:active{background:var(--bg3)}
.m-sel-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
/* Notifications toggle row in settings */
.notif-row{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--card)}
.notif-row .si-ico{font-size:20px}
.notif-row .si-txt{flex:1;font-size:14px;font-weight:500}
/* Point marker */
.pm{
  background:var(--red);border:2px solid #fff;
  border-radius:50% 50% 50% 0;width:28px;height:28px;
  transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 6px rgba(0,0,0,.3);
}
.pm-inner{transform:rotate(45deg);font-size:12px}
/* Members overlay */
#mems-overlay{position:absolute;top:12px;left:12px;z-index:999;display:flex;flex-direction:column;gap:6px;max-width:150px}
.mem-chip{
  background:var(--card);border-radius:20px;padding:5px 10px 5px 6px;
  display:flex;align-items:center;gap:7px;cursor:pointer;
  box-shadow:var(--shadow);font-size:12px;
}
.mem-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.mem-name{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mem-time{font-size:10px;color:var(--text2)}

/* ════════════ SECTIONS ════════════ */
.sec{padding:16px}
.sec-h{font-size:15px;font-weight:800;color:var(--text);margin-bottom:12px}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:12px}
.ci{
  display:flex;align-items:center;gap:12px;padding:14px 16px;
  border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;
}
.ci:last-child{border-bottom:none}
.ci:active{background:var(--bg3)}
.cii{font-size:22px;flex-shrink:0}
.cib{flex:1;min-width:0}
.cit{font-size:15px;font-weight:600}
.cis{font-size:12px;color:var(--text2);margin-top:2px}

/* ════════════ MEMBERS (GROUP TAB) ════════════ */
.mc{
  background:var(--card);border-radius:var(--radius);padding:14px 16px;
  margin-bottom:10px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;
}
.mav{
  width:46px;height:46px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:18px;font-weight:900;color:#fff;flex-shrink:0;
}
.mn{font-size:15px;font-weight:700}
.ms{font-size:12px;color:var(--text2);margin-top:3px}
.badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700}
.bdg-p{background:rgba(26,115,232,.15);color:var(--primary)}
.bdg-a{background:rgba(52,168,83,.15);color:var(--green)}
.bdg-r{background:rgba(234,67,53,.15);color:var(--red)}

/* ════════════ PERMISSIONS ════════════ */
.perm-row{
  display:flex;align-items:center;gap:10px;
  background:var(--bg2);border-radius:10px;padding:10px 14px;margin-bottom:8px;
}
.perm-name{flex:1;font-size:14px;font-weight:600}
/* Toggle switch */
.sw{position:relative;width:46px;height:26px;flex-shrink:0}
.sw input{opacity:0;width:0;height:0}
.sw-sl{
  position:absolute;inset:0;background:var(--border);border-radius:13px;cursor:pointer;
  transition:background .2s;
}
.sw-sl::after{
  content:'';position:absolute;width:20px;height:20px;background:#fff;
  border-radius:50%;top:3px;left:3px;transition:transform .2s;
  box-shadow:0 1px 3px rgba(0,0,0,.3);
}
.sw input:checked+.sw-sl{background:var(--primary)}
.sw input:checked+.sw-sl::after{transform:translateX(20px)}

/* ════════════ ONBOARD ════════════ */
#vOnboard{
  position:fixed;inset:0;background:var(--bg);overflow-y:auto;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;
}
.ol{font-size:72px;margin-bottom:20px}
.ot{font-size:24px;font-weight:900;text-align:center;margin-bottom:8px}
.os{font-size:14px;color:var(--text2);text-align:center;margin-bottom:28px}
.oo{
  background:var(--card);border:2px solid var(--border);border-radius:16px;
  padding:20px;cursor:pointer;transition:border-color .2s,transform .1s;
  display:flex;align-items:center;gap:16px;width:100%;max-width:380px;
  margin-bottom:12px;
}
.oo:active{transform:scale(.98)}
.oo:hover{border-color:var(--primary)}
.oo-ico{font-size:36px}
.oo-h{font-size:16px;font-weight:800}
.oo-s{font-size:13px;color:var(--text2);margin-top:4px}

/* ════════════ CODE DISPLAY ════════════ */
.code-box{
  background:var(--bg3);border-radius:12px;padding:16px 20px;text-align:center;
  letter-spacing:6px;font-size:30px;font-weight:900;color:var(--primary);
  font-family:monospace;user-select:all;cursor:pointer;
}

/* ════════════ MODAL ════════════ */
.mov{
  position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:3000;
  display:flex;align-items:flex-end;justify-content:center;
}
.msh{
  background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:520px;
  max-height:88vh;overflow-y:auto;padding:20px;animation:slideUp .3s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhnd{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.mttl{font-size:18px;font-weight:900;margin-bottom:16px}

/* ════════════ SETTINGS ════════════ */
.sg{margin-bottom:18px}
.sl{font-size:11px;font-weight:800;color:var(--text2);margin-bottom:7px;padding:0 4px;letter-spacing:.5px}
.si{
  background:var(--card);display:flex;align-items:center;gap:12px;
  padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;
}
.si:first-of-type{border-radius:14px 14px 0 0}
.si:last-of-type{border-radius:0 0 14px 14px;border-bottom:none}
.si:only-of-type{border-radius:14px;border-bottom:none}
.si-ico{font-size:20px}
.si-txt{flex:1;font-size:14px;font-weight:500}
.si-val{font-size:13px;color:var(--text2)}

/* ════════════ FAB ════════════ */
.fab{
  position:fixed;bottom:calc(var(--nav)+16px);right:20px;
  width:54px;height:54px;border-radius:50%;border:none;
  background:var(--primary);color:#fff;font-size:26px;cursor:pointer;
  box-shadow:0 4px 16px rgba(26,115,232,.4);
  display:flex;align-items:center;justify-content:center;z-index:500;
  transition:transform .2s;
}
.fab:active{transform:scale(.92)}

/* ════════════ TOAST ════════════ */
#toast{
  position:fixed;bottom:calc(var(--nav)+16px);left:50%;
  transform:translateX(-50%) translateY(120px);
  background:#333;color:#fff;padding:11px 16px 11px 20px;border-radius:999px;
  font-size:14px;font-weight:600;z-index:8000;
  transition:transform .3s ease;white-space:normal;word-break:break-word;
  max-width:calc(100vw - 40px);display:flex;align-items:center;gap:10px;
}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.ok{background:#1b5e20}
#toast.err{background:var(--red)}
.toast-x{background:none;border:none;color:inherit;font-size:20px;line-height:1;cursor:pointer;opacity:.75;padding:0;flex-shrink:0}

/* ════════════ EMPTY ════════════ */
.empty{text-align:center;padding:48px 20px;color:var(--text2)}
.ei{font-size:54px;margin-bottom:12px}
.et{font-size:17px;font-weight:700;color:var(--text)}
.es{font-size:13px;margin-top:6px}

/* ════════════ CONFETTI ════════════ */
.cfw{position:fixed;inset:0;pointer-events:none;z-index:9998;overflow:hidden}
@keyframes cfFall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}
.cf{position:absolute;animation:cfFall linear forwards}

/* ════════════ MISC ════════════ */
.row{display:flex;gap:8px}
.flex1{flex:1}
select.lang-sel{
  padding:8px 12px;border:none;background:transparent;
  font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;color:var(--text);
}

//  FIREBASE INIT

async function initFirebase() {
  try {
    if (!firebase.apps.length) {
      firebase.initializeApp(FIREBASE_CONFIG);
    }
    auth = firebase.auth();
    db   = firebase.firestore();

    // Fallback: if onAuthStateChanged never fires within 8s, show auth
    const splashTimeout = setTimeout(() => {
      hideSplash(); showView('vAuth'); renderUI();
    }, 8000);

    auth.onAuthStateChanged(user => {
      clearTimeout(splashTimeout);
      onAuth(user);
    });
  } catch(e) {
    console.error('Firebase init error:', e);
    hideSplash(); showView('vAuth'); renderUI();
    showToast('Firebase error: ' + e.message, 'err');
  }
}

async function onAuth(user) {
  try {
    if (user) {
      me = user;
      // Load or create user profile
      const ref = db.collection('users').doc(me.uid);
      const snap = await ref.get();
      if (!snap.exists) {
        await ref.set({ name: me.displayName || me.email.split('@')[0], email: me.email, createdAt: new Date() });
      }
      myProfile = (await ref.get()).data();
      // Check if user is in a group
      const gSnap = await db.collection('users').doc(me.uid).get();
      const gid = gSnap.data()?.groupId;
      if (gid) {
        groupId = gid;
        await initApp();
      } else {
        showView('vOnboard');
        renderUI();
      }
    } else {
      me = null; myProfile = null; groupId = null;
      showView('vAuth');
      renderUI();
    }
  } catch(e) {
    console.error('onAuth error:', e);
    showView('vAuth');
    renderUI();
    showToast('Error: ' + e.message, 'err');
  }
  hideSplash();
}

function showView(id) {
  ['vLoading','vAuth','vOnboard','vApp'].forEach(v => {
    document.getElementById(v).hidden = (v !== id);
  });
}
function hideSplash() {
  const el = document.getElementById('vLoading');
  el.style.opacity = '0';
  setTimeout(() => el.hidden = true, 500);
}

function switchAuthTab(t) {
  document.getElementById('formLogin').hidden = t !== 'login';
  document.getElementById('formReg').hidden = t !== 'reg';
  document.getElementById('tabLogin').className = 'atab' + (t==='login'?' on':'');
  document.getElementById('tabReg').className = 'atab' + (t==='reg'?' on':'');
}

async function doLogin() {
  const email = document.getElementById('iEmail').value.trim();
  const pass  = document.getElementById('iPass').value;
  if (!email||!pass) return;
  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch(e) { showToast(t('errLogin')+': '+e.message,'err'); }
}

async function doRegister() {
  const name  = document.getElementById('iName').value.trim();
  const email = document.getElementById('iEmail2').value.trim();
  const pass  = document.getElementById('iPass2').value;
  if (!name||!email||!pass) return;
  try {
    const cred = await auth.createUserWithEmailAndPassword(email, pass);
    await cred.user.updateProfile({ displayName: name });
    await db.collection('users').doc(cred.user.uid).set({ name, email, createdAt: new Date() });
  } catch(e) { showToast(t('errReg')+': '+e.message,'err'); }
}

async function doGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();
  try {
    await auth.signInWithPopup(provider);
  } catch(e) {
    if (e.code === 'auth/popup-blocked') {
      // Mobile fallback
      await auth.signInWithRedirect(provider);
    } else if (e.code !== 'auth/popup-closed-by-user') {
      showToast(t('errLogin') + ': ' + e.message, 'err');
    }
  }
}

async function doLogout() {
  stopTracking();
  unsubAll();
  groupId = null; groupData = null;
  members = {}; points = [];
  await auth.signOut();
}

async function doCreateGroup() {
  const name = document.getElementById('iGrpName').value.trim() || (myProfile?.name + "'s Family");
  const code = genCode(8);
  try {
    const gRef = db.collection('groups').doc();
    groupId = gRef.id;
    await gRef.set({
      name, adminUid: me.uid,
      members: [me.uid],
      joinCode: code,
      permissions: {},
      createdAt: new Date()
    });
    await db.collection('joinCodes').doc(code).set({ groupId, createdAt: new Date() });
    // Store in groups array (multi-group support)
    await db.collection('users').doc(me.uid).set({
      groupId,
      groups: firebase.firestore.FieldValue.arrayUnion(groupId)
    }, {merge: true});
    confetti();
    showToast(t('okCreate'),'ok');
    await initApp();
  } catch(e) { showToast(e.message,'err'); }
}

async function doJoinGroup() {
  const code = document.getElementById('iJoinCode').value.trim().toUpperCase();
  if (code.length < 4) return;
  try {
    const q = await db.collection('groups').where('joinCode','==',code).limit(1).get();
    if (q.empty) { showToast(t('errJoin'),'err'); return; }
    const grpDoc = q.docs[0];
    groupId = grpDoc.id;
    await db.collection('groups').doc(groupId).update({
      members: firebase.firestore.FieldValue.arrayUnion(me.uid)
    });
    await db.collection('users').doc(me.uid).set({
      groupId,
      groups: firebase.firestore.FieldValue.arrayUnion(groupId)
    }, {merge: true});
    confetti();
    showToast(t('okJoin'),'ok');
    await initApp();
  } catch(e) {
    console.error('Join error:', e);
    showToast(e.message, 'err');
  }
}

function genCode(len) {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:len}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
}

async function initApp() {
  showView('vApp');
  renderUI();
  // Load group
  await loadGroup();
  // Subscribe to locations
  subLocations();
  // Subscribe to points
  subPoints();
  // Subscribe to admin arrival notifications
  subAdminNotifications();
  // Init map (after DOM is shown)
  setTimeout(() => { if(!mapInit) initMap(); }, 300);
  // Start tracking
  startTracking();
  // Request notifs
  reqNotifPermQuiet();
}

function unsubAll() {
  if (unsubLocs) { unsubLocs(); unsubLocs = null; }
  if (unsubPts)  { unsubPts();  unsubPts  = null; }
  if (unsubGrp)  { unsubGrp();  unsubGrp  = null; }
  if (unsubAdminNotifs) { unsubAdminNotifs(); unsubAdminNotifs = null; }
}

async function loadGroup() {
  if (!groupId) return;
  const snap = await db.collection('groups').doc(groupId).get();
  groupData = snap.data();
  renderGroupTab();
  // Subscribe to live group updates (permissions)
  if (unsubGrp) unsubGrp();
  unsubGrp = db.collection('groups').doc(groupId).onSnapshot(s => {
    groupData = s.data();
    if (groupData?.name) localStorage.setItem('fl_grp_name', groupData.name);
    // Update group name in nav button
    const gnlEl = document.getElementById('nlGroup');
    if (gnlEl) gnlEl.textContent = groupData?.name || t('navGrp');
    // Update member selector button with group name
    const selEl = document.getElementById('selName');
    if (selEl && !focusedMember) selEl.textContent = groupData?.name || '';
    renderGroupTab();
  });
}

function renderGroupTab() {
  if (!groupData) return;
  const isAdmin = groupData.adminUid === me.uid;
  // Check how many groups user belongs to (for switcher)
  const myGroups = myProfile?.groups || [groupId];
  const multiGroup = myGroups.length > 1;

  document.getElementById('grpInfoCard').innerHTML = `
    <div class="card">
      <div class="ci" style="cursor:default">
        <span class="cii">👨‍👩‍👧‍👦</span>
        <div class="cib">
          <div class="cit">${esc(groupData.name)}</div>
          <div class="cis">${groupData.members?.length||1} ${t('memsTitle').toLowerCase()} · ${isAdmin?'<span class="badge bdg-a">'+t('admin')+'</span>':''}</div>
        </div>
        <div style="display:flex;gap:6px">
          ${isAdmin ? `<button class="small-btn" onclick="openRenameGroup()" title="${t('renameGroup')}">✏️</button>` : ''}
          ${multiGroup ? `<button class="small-btn" onclick="showGroupSwitcher()">🔄</button>` : ''}
          <button class="small-btn" onclick="showGroupCode()">#${esc(groupData.joinCode||'')}</button>
        </div>
      </div>
    </div>`;

  const memsEl = document.getElementById('grpMembers');
  memsEl.innerHTML = '';
  (groupData.members || [me.uid]).forEach(uid => {
    const m = members[uid] || {};
    const name = m.name || uid.slice(0,8);
    const color = colorForUid(uid);
    const isMe = uid === me.uid;
    const isAdm = uid === groupData.adminUid;
    const lastSeen = m.ts ? relativeTime(m.ts.toDate ? m.ts.toDate() : new Date(m.ts)) : '';
    // Only admin sees delete button, and can't delete themselves
    const delBtn = (isAdmin && !isMe) ? `<button class="small-btn del" onclick="removeMember('${uid}')">✕</button>` : '';
    memsEl.innerHTML += `
      <div class="mc">
        <div class="mav" style="background:${color}">${initials(name)}</div>
        <div style="flex:1">
          <div class="mn">${esc(name)} ${isMe?'<span class="badge bdg-p">'+t('me')+'</span>':''} ${isAdm?'<span class="badge bdg-a">'+t('admin')+'</span>':''}</div>
          <div class="ms">${lastSeen ? t('lastSeen')+': '+lastSeen : ''}</div>
        </div>
        ${delBtn}
      </div>`;
  });

  renderPermissions();
}

function renderPermissions() {
  if (!groupData) return;
  const perms = groupData.permissions || {};
  const myPerms = perms[me.uid] || [];  // UIDs who are ALLOWED to see me
  const el = document.getElementById('permsList');
  el.innerHTML = '';
  (groupData.members || []).filter(uid => uid !== me.uid).forEach(uid => {
    const m = members[uid] || {};
    const name = m.name || uid.slice(0,8);
    const checked = myPerms.includes(uid);
    el.innerHTML += `
      <div class="perm-row">
        <div style="width:36px;height:36px;border-radius:50%;background:${colorForUid(uid)};display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0">${initials(name)}</div>
        <span class="perm-name">${esc(name)}</span>
        <label class="sw">
          <input type="checkbox" ${checked?'checked':''} onchange="togglePerm('${uid}',this.checked)">
          <span class="sw-sl"></span>
        </label>
      </div>`;
  });
  if (!el.innerHTML) el.innerHTML = '<div class="cis" style="text-align:center;padding:12px">' + (groupData.members?.length>1 ? t('permDesc') : '–') + '</div>';
}

async function togglePerm(targetUid, allow) {
  const perms = groupData?.permissions || {};
  const myList = [...(perms[me.uid] || [])];
  if (allow) { if (!myList.includes(targetUid)) myList.push(targetUid); }
  else { const i = myList.indexOf(targetUid); if (i > -1) myList.splice(i,1); }
  await db.collection('groups').doc(groupId).update({
    [`permissions.${me.uid}`]: myList
  });
}

async function removeMember(uid) {
  if (!confirm(t('confirmLeave'))) return;
  await db.collection('groups').doc(groupId).update({
    members: firebase.firestore.FieldValue.arrayRemove(uid)
  });
  await db.collection('users').doc(uid).update({ groupId: firebase.firestore.FieldValue.delete() });
}

function initMap() {
  if (mapInit) return;
  mapInit = true;
  const el = document.getElementById('map');
  mapObj = L.map(el, { zoomControl: false, attributionControl: false })
    .setView([31.7683, 35.2137], 10);
  // CartoDB Voyager — clean, readable, shows house numbers at zoom 17+
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd',
    maxZoom: 21, maxNativeZoom: 20,
    attribution: '© <a href="https://openstreetmap.org">OSM</a> © <a href="https://carto.com">CARTO</a>'
  }).addTo(mapObj);
  L.control.attribution({ prefix: false }).addTo(mapObj);
  // Zoom control at bottom-left
  L.control.zoom({ position: 'bottomleft' }).addTo(mapObj);
  mapObj.on('click', onMapClick);
  setTimeout(() => mapObj.invalidateSize(), 200);
}

function onMapClick(e) {
  if (!addPointMode) return;
  openAddPointModal(e.latlng.lat, e.latlng.lng);
  addPointMode = false;
  document.getElementById('addHint').hidden = true;
}

function startAddPoint() {
  addPointMode = true;
  switchTab('map');
  document.getElementById('addHint').hidden = false;
  document.getElementById('addHintTxt').textContent = t('addHint');
}
function cancelAddPoint() {
  addPointMode = false;
  document.getElementById('addHint').hidden = true;
}

function openAddPointModal(lat, lng) {

    <div class="mttl">${t('addPt')}</div>
    <div style="background:var(--bg3);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--text2)">
      📍 ${lat.toFixed(5)}, ${lng.toFixed(5)}
    </div>
    <div class="fg"><label class="fl">${t('ptName')}</label>
      <input class="fi" type="text" id="mPtName" placeholder="${t('ptName')}" autofocus></div>
    <div class="fg"><label class="fl">${t('ptRadius')}</label>
      <input class="fi" type="number" id="mPtRadius" value="${t('ptRadDef')}" min="50" max="5000"></div>
    <div class="row mt16">
      <button class="btn btn-s flex1" onclick="closeModal()">${t('cancel')}</button>
      <button class="btn btn-p flex1" onclick="savePoint(${lat},${lng})">${t('save')}</button>
    </div>`;
  openModal(html);
  setTimeout(() => document.getElementById('mPtName')?.focus(), 100);
}

async function savePoint(lat, lng) {
  const name   = document.getElementById('mPtName')?.value.trim();
  const radius = parseInt(document.getElementById('mPtRadius')?.value) || 200;
  if (!name) return;
  await db.collection('groups').doc(groupId).collection('points').add({
    name, lat, lng, radius, createdBy: me.uid, createdAt: new Date()
  });
  closeModal();
  showToastLong('✅ '+name,'ok');
  switchTab('points');
}

async function deletePoint(id) {
  if (!confirm(t('confirmDelPt'))) return;
  await db.collection('groups').doc(groupId).collection('points').doc(id).delete();
  showToast(t('del'),'ok');
}

function subPoints() {
  if (!groupId) return;
  if (unsubPts) unsubPts();
  unsubPts = db.collection('groups').doc(groupId).collection('points')
    .onSnapshot(snap => {
      points = snap.docs.map(d => ({id:d.id,...d.data()}));
      renderPoints();
      syncPointMarkers();
    });
}

function renderPoints() {
  const el = document.getElementById('ptList');
  if (!points.length) {
    el.innerHTML = `<div class="empty"><div class="ei">📍</div><div class="et">${t('noPts')}</div><div class="es">${t('noPtsS')}</div></div>`;
    return;
  }
  el.innerHTML = points.map(p => `
    <div class="point-row">
      <div class="point-ico">📍</div>

// ══════════════════════════════════════════════
//  LOCATION TRACKING
// ══════════════════════════════════════════════
function startTracking() {
  if (!navigator.geolocation) { showToast(t('noGps'),'err'); return; }
  const opts = { enableHighAccuracy: true, maximumAge: 10000, timeout: 20000 };
  watchId = navigator.geolocation.watchPosition(onPosition, onPosErr, opts);
  // Interval push every 30s
  locInterval = setInterval(() => {
    if (myLat) pushLocation(myLat, myLng, currentMotion);
  }, LOCATION_UPDATE_MS);
  // Background: when tab is hidden, poll every 60s via geolocation
  document.addEventListener('visibilitychange', onVisibilityChange);
}

function onVisibilityChange() {
  if (document.hidden) {
    // App went to background — start 60s polling
    bgInterval = setInterval(() => {
      navigator.geolocation.getCurrentPosition(onPosition, onPosErr,
        { enableHighAccuracy: false, maximumAge: 30000, timeout: 15000 });
    }, 60000);
  } else {
    // App came to foreground — stop bg polling, watchPosition resumes
    if (bgInterval) { clearInterval(bgInterval); bgInterval = null; }
  }
}

function stopTracking() {
  if (watchId) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  if (locInterval) { clearInterval(locInterval); locInterval = null; }
  if (bgInterval)  { clearInterval(bgInterval); bgInterval = null; }
  document.removeEventListener('visibilitychange', onVisibilityChange);
}

function onPosition(pos) {
  const newLat = pos.coords.latitude;
  const newLng = pos.coords.longitude;
  const speed  = pos.coords.speed; // m/s or null

  // Motion detection based on GPS speed
  currentMotion = detectMotion(speed);

  // Accumulate daily metrics
  if (myLat !== null) updateMetrics(newLat, newLng, currentMotion);

  myLat = newLat;
  myLng = newLng;

  if (!isHidden) pushLocation(myLat, myLng, currentMotion);
  updateMyMarker(myLat, myLng, pos.coords.accuracy);
  checkGeofencing(myLat, myLng);
}

function detectMotion(speed) {
  if (speed === null || speed === undefined || speed < 0) return null;
  if (speed < 0.5)  return 'still';
  if (speed < 1.5)  return 'walking';   // < ~5.4 km/h
  if (speed < 7.0)  return 'cycling';   // < ~25 km/h
  return 'driving';
}

function onPosErr(err) {
  console.warn('GPS error:', err.message);
}

function updateMemberMarker(uid, data) {
  if (!mapObj) return;

  // Permission check
  const perms = groupData?.permissions || {};
  const whoCanSeeUid = perms[uid];
  const canSee = !whoCanSeeUid || whoCanSeeUid.length === 0 || whoCanSeeUid.includes(me.uid);

  if (!data.lat || data.hidden || !canSee) {
    if (memberMarkers[uid]) { mapObj.removeLayer(memberMarkers[uid]); delete memberMarkers[uid]; }
    return;
  }

  if (focusedMember && focusedMember !== uid) {
    if (memberMarkers[uid]) { mapObj.removeLayer(memberMarkers[uid]); delete memberMarkers[uid]; }
    return;
  }

  const color = colorForUid(uid);
  const name = data.name || uid.slice(0,6);
  const motion = data.motion || null;
  const motionEmoji = motion && MOTION_EMOJI[motion] ? MOTION_EMOJI[motion] : '';

  // ── Cluster spread: collect all visible members near this point ──
  const CLUSTER_DIST = 30; // meters
  const allVisible = Object.entries(members).filter(([id, d]) => {
    if (id === uid) return false;
    if (!d.lat || d.hidden) return false;
    return haversine(data.lat, data.lng, d.lat, d.lng) < CLUSTER_DIST;
  });

  let lat = data.lat, lng = data.lng;
  if (allVisible.length > 0) {
    // Assign a stable index based on uid sort order among clustered members
    const cluster = [...allVisible.map(([id]) => id), uid].sort();
    const idx = cluster.indexOf(uid);
    const total = cluster.length;
    const SPREAD = 0.000036; // ~4m spread radius
    const angle = (idx / total) * 2 * Math.PI - Math.PI / 2;
    lat = data.lat + SPREAD * Math.cos(angle);
    lng = data.lng + SPREAD * Math.sin(angle);
  }

  const motionBadge = motionEmoji ? `<div class="mm-motion">${motionEmoji}</div>` : '';
  const icon = L.divIcon({
    className:'', iconSize:[44,44], iconAnchor:[22,22],
    html:`<div class="mm" style="background:${color}">${initials(name)}${motionBadge}</div>`
  });
  const ts = data.ts?.toDate ? data.ts.toDate() : null;
  const motionLabel = motion ? ` · ${t('motion'+motion.charAt(0).toUpperCase()+motion.slice(1))||motion}` : '';
  const popup = `<b>${esc(name)}</b>${motionLabel}<br><small>${ts ? t('lastSeen')+': '+relativeTime(ts) : ''}</small>`;

  if (!memberMarkers[uid]) {
    memberMarkers[uid] = L.marker([lat,lng],{icon}).addTo(mapObj).bindPopup(popup);
  } else {
    memberMarkers[uid].setLatLng([lat,lng]);
    memberMarkers[uid].setIcon(icon);
    memberMarkers[uid].setPopupContent(popup);
  }
}

//  GEOFENCING
// ══════════════════════════════════════════════
function checkGeofencing(lat, lng) {
  points.forEach(p => {
    const dist = haversine(lat, lng, p.lat, p.lng);
    if (dist <= p.radius && !arrivedSet.has(p.id)) {
      arrivedSet.add(p.id);
      sendArrivalNotif(p.name);
      // Fix 6: notify admin via Firestore
      notifyAdminArrival(p.name, lat, lng);
    } else if (dist > p.radius * 1.5 && arrivedSet.has(p.id)) {
      arrivedSet.delete(p.id);
    }
  });
}

// Admin listens to arrival notifications
let unsubAdminNotifs = null;
function subAdminNotifications() {
  if (!me || !groupId) return;
  if (unsubAdminNotifs) { unsubAdminNotifs(); unsubAdminNotifs = null; }
  const isAdmin = groupData?.adminUid === me.uid;
  if (!isAdmin) return;
  // Listen for new unseen notifications for me as admin
  unsubAdminNotifs = db.collection('adminNotifs')
    .where('adminUid','==',me.uid)
    .where('groupId','==',groupId)
    .where('seen','==',false)
    .onSnapshot(snap => {
      snap.docs.forEach(doc => {
        const n = doc.data();
        const ts = n.ts?.toDate ? n.ts.toDate() : new Date();
        // Only show notifications from last 5 minutes
        if (Date.now() - ts.getTime() < 300000) {
          const msg = `📍 ${n.memberName} ${t('arriveAt')}: ${n.pointName}`;
          showToastLong(msg, 'ok');
          if (notifEnabled && Notification.permission === 'granted') {
            new Notification('📍 Family Location', {
              body: msg,
              icon: 'icons/icon-192.png',
              vibrate: [200, 100, 200]
            });
          }
        }
        // Mark as seen
        doc.ref.update({ seen: true }).catch(()=>{});
      });
    });
}

function sendArrivalNotif(name) {
  if (!notifEnabled) return;
  const msg = `${t('arriveAt')}: ${name}`;
  showToastLong('📍 '+msg,'ok');
  if (Notification.permission === 'granted') {
    new Notification('📍 Family Location', { body: msg, icon: 'icons/icon.svg' });
  }
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function relativeTime(date) {
  if (!date) return '';
  const diff = Math.floor((Date.now() - date.getTime()) / 1000);
  if (diff < 60) return t('now');
  const m = Math.floor(diff/60);
  if (m < 60) return `${m} ${t('minsAgo')}`;
  return date.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

function initInstallPrompt() {
  if (isInStandaloneMode) { updateInstallUI(); return; }
  if (isIOS) {
    if (!localStorage.getItem('fl_dismissed')) setTimeout(showIOSInstall, 4000);
    updateInstallUI(); return;
  }
  // Listen for Chrome's ready signal — only then show the banner
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredInstallPrompt = e;
    updateInstallUI();
    if (!localStorage.getItem('fl_dismissed')) {
      setTimeout(() => {
        const b = document.getElementById('installBanner');
        if (b) b.style.display = 'flex';
      }, 1000);
    }
  });
  window.addEventListener('appinstalled', () => {
    const b = document.getElementById('installBanner');
    if (b) b.style.display = 'none';
    deferredInstallPrompt = null;
    updateInstallUI();
    showToast('✅ ' + t('sInstalled'));
  });
  updateInstallUI();
}

function updateInstallUI() {
  const elAlways  = document.getElementById('siInstallAlways');
  const elDone    = document.getElementById('siInstalled');
  if (!elAlways) return;
  setText('sInstLbl','sInst');

  if (isInStandaloneMode) {
    elAlways.style.display = 'none';
    elDone.style.display = 'flex';
  } else {
    elAlways.style.display = 'flex';
    elDone.style.display = 'none';
  }
}

//  METRICS + LOG + ROUTE
// ══════════════════════════════════════════════
const STEPS_PER_KM  = 1300;
const STAY_DIST_M   = 50;   // consider "staying" if moved <50m
const STAY_MIN_MS   = 30 * 60 * 1000; // 30 minutes
let stayCandidate   = null; // {lat, lng, startTs, motion}
let activeRoute     = null; // L.layerGroup on map
let trackPoints     = [];   // [{lat,lng,ts,motion}] for today

async function updateMetrics(lat, lng, motion) {
  if (!me || !groupId) return;
  const now = Date.now();
  const today = new Date().toISOString().slice(0,10);

  // ── Track point for daily route ──
  trackPoints.push({ lat, lng, ts: now, motion: motion||'still' });
  // Save track every 5 points to Firestore (batch)
  if (trackPoints.length % 5 === 0) {
    const docId = `${groupId}_${me.uid}_${today}`;
    db.collection('tracks').doc(docId).set({
      uid: me.uid, groupId, date: today,
      name: myProfile?.name || me.email,
      points: firebase.firestore.FieldValue.arrayUnion(...trackPoints.slice(-5).map(p => ({
        lat: p.lat, lng: p.lng, ts: p.ts, motion: p.motion
      })))
    }, {merge: true}).catch(()=>{});
  }

  // ── Stay detection for log ──
  if (!stayCandidate) {
    stayCandidate = { lat, lng, startTs: now, motion };
  } else {
    const moved = haversine(stayCandidate.lat, stayCandidate.lng, lat, lng);
    if (moved > STAY_DIST_M) {
      // User moved — check if previous stay was long enough
      const duration = now - stayCandidate.startTs;
      if (duration >= STAY_MIN_MS) {
        saveLocationLog(stayCandidate.lat, stayCandidate.lng, stayCandidate.startTs, now);
      }
      stayCandidate = { lat, lng, startTs: now, motion };
    }
  }

  // ── Distance metrics ──
  if (!lastMetricPos) { lastMetricPos = {lat, lng}; return; }
  const dist = haversine(lastMetricPos.lat, lastMetricPos.lng, lat, lng);
  if (dist < 8) return;
  lastMetricPos = {lat, lng};
  const distKm = dist / 1000;
  const steps = motion === 'walking' ? Math.round(distKm * STEPS_PER_KM) : 0;
  try {
    await db.collection('metrics').doc(`${groupId}_${me.uid}_${today}`).set({
      uid: me.uid, groupId, date: today,
      name: myProfile?.name || me.email,
      distance: firebase.firestore.FieldValue.increment(distKm),
      steps: firebase.firestore.FieldValue.increment(steps),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, {merge: true});
  } catch(e) { /* fail silently */ }
}

async function saveLocationLog(lat, lng, startTs, endTs) {
  const today = new Date().toISOString().slice(0,10);
  const durationMin = Math.round((endTs - startTs) / 60000);
  // Reverse geocode via Nominatim (OSM)
  let address = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`, {
      headers: {'Accept-Language': lang}
    });
    if (r.ok) {
      const j = await r.json();
      address = j.display_name?.split(',').slice(0,3).join(', ') || address;
    }
  } catch(e) {}
  const entry = { lat, lng, address, startTs, endTs, durationMin, date: today };
  db.collection('locationLog').add({
    uid: me.uid, groupId, name: myProfile?.name || me.email,
    ...entry, createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).catch(()=>{});
}

async function loadLocationLog() {
  const el = document.getElementById('logList');
  if (!el || !groupId) return;
  const logTitleEl = document.getElementById('logTitleEl');
  if (logTitleEl) logTitleEl.textContent = t('logTitle');
  el.innerHTML = '<div style="text-align:center;padding:12px;color:var(--text2)">⏳</div>';
  const picker2 = document.getElementById('metDatePicker');
  const today = (picker2?.value) || new Date().toISOString().slice(0,10);
  const selectedDate = today;
  const nowTs = Date.now();

  // ── Helpers ──
  const fmt = ts => new Date(ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  const durStr = ms => {
    const m = Math.round(ms/60000);
    if (m < 60) return `${m} ד'`;
    return `${Math.floor(m/60)}ש' ${m%60}ד'`;
  };
  const motionIcon = m => ({ still:'🔵', walking:'🚶', cycling:'🚴', driving:'🚗' }[m] || '⚫');
  const motionHe   = m => ({ still:'עמד', walking:'הלך', cycling:'אופניים', driving:'נסע' }[m] || m);

  // Helper: find nearest saved point within 20m — use its name as address
  const nearestPoint = (lat, lng) => {
    for (const p of points) {
      if (haversine(lat, lng, p.lat, p.lng) <= 20) return p.name;
    }
    return null;
  };

  // Reverse geocode via OSM (cached)
  const addrCache = {};
  const getAddr = async (lat, lng) => {
    // Check saved points first — most accurate for familiar places
    const ptName = nearestPoint(lat, lng);
    if (ptName) return '📍 ' + ptName;

    const key = `${lat.toFixed(3)},${lng.toFixed(3)}`;
    if (addrCache[key]) return addrCache[key];
    try {
      const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&zoom=18&addressdetails=1`,
        { headers: {'Accept-Language': lang} });
      if (r.ok) {
        const j = await r.json();
        const parts = j.address;
        // Israeli address format: street name + house number + city
        const street = parts?.road || parts?.pedestrian || parts?.footway || parts?.residential || '';
        const num    = parts?.house_number || '';
        const city   = parts?.city || parts?.town || parts?.village || parts?.suburb || '';
        const addr   = [street, num, city].filter(Boolean).join(' ');
        addrCache[key] = addr || `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
      }
    } catch(e) { addrCache[key] = `${lat.toFixed(4)}, ${lng.toFixed(4)}`; }
    return addrCache[key] || `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
  };

  try {
    const isAdmin = groupData?.adminUid === me.uid;
    const uidsToLoad = isAdmin ? (groupData?.members || [me.uid]) : [me.uid];
    const trackDocs = await Promise.all(
      uidsToLoad.map(uid => db.collection('tracks').doc(`${groupId}_${uid}_${selectedDate}`).get())
    );

    el.innerHTML = '';
    let hasData = false;

    for (let i = 0; i < trackDocs.length; i++) {
      const doc = trackDocs[i];
      const uid = uidsToLoad[i];
      if (!doc.exists || !doc.data().points?.length) continue;
      const rawPts = doc.data().points.sort((a,b) => a.ts - b.ts);
      if (rawPts.length < 2) continue;
      hasData = true;
      const name = doc.data().name || uid.slice(0,6);
      const color = colorForUid(uid);
      const isMe = uid === me.uid;

      // ── Location-based segmentation: group consecutive points within 25m of anchor ──
      // Merges GPS jitter — same location = one row with start→end time
      const SAME_LOC_M = 25;
      const MIN_DUR_MS = 60000; // skip segments < 1 min
      const segs = [];
      let anchorPt = rawPts[0];
      let segStartIdx = 0;

      const pushSeg = (startIdx, endIdx) => {
        const durationMs = rawPts[endIdx].ts - rawPts[startIdx].ts;
        if (durationMs < MIN_DUR_MS) return;
        const slice = rawPts.slice(startIdx, endIdx + 1);
        const cnt = {};
        slice.forEach(p => { const m = p.motion || 'still'; cnt[m] = (cnt[m]||0) + 1; });
        const dom = Object.entries(cnt).sort((a,b) => b[1]-a[1])[0][0];
        segs.push({
          motion: dom,
          startTs: rawPts[startIdx].ts,
          endTs: rawPts[endIdx].ts,
          lat: anchorPt.lat, lng: anchorPt.lng,
          isOngoing: Date.now() - rawPts[endIdx].ts < 120000
        });
      };

      for (let j = 1; j < rawPts.length; j++) {
        const dist = haversine(anchorPt.lat, anchorPt.lng, rawPts[j].lat, rawPts[j].lng);
        if (dist > SAME_LOC_M) {
          pushSeg(segStartIdx, j - 1);
          anchorPt = rawPts[j];
          segStartIdx = j;
        }
      }
      pushSeg(segStartIdx, rawPts.length - 1);

      // Build HTML rows with addresses
      const rowsHtml = [];
      for (const seg of segs) {
        const isNow = seg.isOngoing;
        const endStr = isNow ? 'עכשיו' : fmt(seg.endTs);
        const dur = durStr(seg.endTs - seg.startTs);
        const addr = await getAddr(seg.lat, seg.lng);
        const ico = motionIcon(seg.motion);
        const lbl = motionHe(seg.motion);
        rowsHtml.push(`
          <tr style="border-top:1px solid var(--border);cursor:pointer" onclick="switchTab('map');flyToPoint(${seg.lat},${seg.lng})">
            <td style="padding:9px 12px;font-weight:600;white-space:nowrap">${fmt(seg.startTs)} – ${endStr}</td>
            <td style="padding:9px 12px">${ico} ${lbl}</td>
            <td style="padding:9px 12px;color:var(--text2);white-space:nowrap">${dur}</td>
            <td style="padding:9px 12px;font-size:11px;color:var(--text2);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(addr)}</td>
          </tr>`);
      }

      if (!rowsHtml.length) continue;

      el.innerHTML += `
        <div style="margin-bottom:14px">
          ${isAdmin && !isMe ? `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <div style="width:28px;height:28px;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff">${initials(name)}</div>
            <span style="font-weight:700;font-size:14px">${esc(name)}</span>
          </div>` : ''}
          <div style="background:var(--card);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);overflow-x:auto">
            <table style="width:100%;border-collapse:collapse;font-size:12px">
              <thead><tr style="background:var(--bg3)">
                <th style="padding:8px 12px;text-align:right;font-weight:700;color:var(--text2)">זמן</th>
                <th style="padding:8px 12px;text-align:right;font-weight:700;color:var(--text2)">פעילות</th>
                <th style="padding:8px 12px;text-align:right;font-weight:700;color:var(--text2)">משך</th>
                <th style="padding:8px 12px;text-align:right;font-weight:700;color:var(--text2)">מיקום</th>
              </tr></thead>
              <tbody>${rowsHtml.join('')}</tbody>
            </table>
          </div>
        </div>`;
    }

    if (!hasData || !el.innerHTML.includes('<table')) {
      el.innerHTML = `<div class="empty"><div class="ei">📌</div><div class="et">${t('logNoData')}</div></div>`;
    }
  } catch(e) {
    el.innerHTML = `<div style="padding:12px;color:var(--red)">${e.message}</div>`;
  }
}

// ── Daily Route ──
let routeLayer = null;

async function showDailyRoute(uid, name, color) {
  // Clear previous route
  if (routeLayer) { mapObj.removeLayer(routeLayer); routeLayer = null; }
  const today = new Date().toISOString().slice(0,10);
  const docId = `${groupId}_${uid}_${today}`;
  try {
    const doc = await db.collection('tracks').doc(docId).get();
    if (!doc.exists || !doc.data().points?.length) {
      showToast(t('routeNoData'), 'err'); return;
    }
    const pts = doc.data().points.sort((a,b) => a.ts - b.ts);
    if (pts.length < 2) { showToast(t('routeNoData'), 'err'); return; }
    routeLayer = L.layerGroup().addTo(mapObj);
    // Color per motion type
    const motionColors = { still:'#546e7a', walking:'#34a853', cycling:'#fbbc04', driving:'#ea4335' };
    // Draw polyline segments colored by motion
    for (let i = 1; i < pts.length; i++) {
      const c = motionColors[pts[i].motion] || '#1a73e8';
      L.polyline([[pts[i-1].lat, pts[i-1].lng],[pts[i].lat, pts[i].lng]],
        {color:c, weight:4, opacity:.8}).addTo(routeLayer);
    }
    // Find stop points (stayed >2min at same location)
    let stopN = 0;
    const stops = [];
    let runStart = 0;
    for (let i = 1; i < pts.length; i++) {
      const d = haversine(pts[runStart].lat, pts[runStart].lng, pts[i].lat, pts[i].lng);
      const dt = pts[i].ts - pts[runStart].ts;
      if (d > 80 || i === pts.length-1) {
        if (dt > 120000) { // stayed > 2min
          stops.push({...pts[runStart], n: ++stopN, motion: pts[runStart].motion,
            duration: Math.round(dt/60000)});
        }
        runStart = i;
      }
    }
    // Draw numbered stop markers
    stops.forEach(s => {
      const mico = MOTION_EMOJI[s.motion] || '';
      const icon = L.divIcon({
        className:'', iconSize:[24,24], iconAnchor:[12,12],
        html:`<div class="route-stop-marker">${s.n}</div>`
      });
      const ts = new Date(s.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      L.marker([s.lat,s.lng],{icon}).addTo(routeLayer)
        .bindPopup(`<b>${t('routeStop')} ${s.n}</b>${mico}<br>${ts} · ${s.duration} ${t('logMins')}`);
    });
    // Start/end markers
    L.circleMarker([pts[0].lat,pts[0].lng],{radius:8,color:'#34a853',fillColor:'#34a853',fillOpacity:1,weight:2})
      .addTo(routeLayer).bindPopup('🟢 ' + new Date(pts[0].ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}));
    L.circleMarker([pts[pts.length-1].lat,pts[pts.length-1].lng],{radius:8,color:'#ea4335',fillColor:'#ea4335',fillOpacity:1,weight:2})
      .addTo(routeLayer).bindPopup('🔴 ' + new Date(pts[pts.length-1].ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}));
    // Fit map to route
    const latlngs = pts.map(p => [p.lat, p.lng]);
    mapObj.fitBounds(L.latLngBounds(latlngs).pad(0.15));
    switchTab('map');
    showToast(`🗺️ ${name} · ${stops.length} ${t('routeStop').toLowerCase()}`, 'ok', 6000);
  } catch(e) { showToast(e.message, 'err'); }
}

// ══════════════════════════════════════════════
//  MEMBER SELECTOR
// ══════════════════════════════════════════════
function toggleMemberSel() {
  const drop = document.getElementById('selDrop');
  if (!drop) return;
  // Build list
  const arr = Object.entries(members).filter(([uid,d]) => !d.hidden);
  drop.innerHTML = `
    <div class="m-sel-item" onclick="selectMember(null)">
      <div class="m-sel-dot" style="background:var(--primary)"></div>
      <span>${t('allMembers')}</span>
    </div>` +
    arr.map(([uid,d]) => {
      const color = colorForUid(uid);
      const name = d.name || uid.slice(0,6);
      return `<div class="m-sel-item" onclick="selectMember('${uid}')">
        <div class="m-sel-dot" style="background:${color}"></div>
        <span>${esc(name)}</span>
      </div>`;
    }).join('');
  drop.className = 'm-sel-drop' + (drop.className.includes('open') ? '' : ' open');
}

function selectMember(uid) {
  focusedMember = uid;
  const drop = document.getElementById('selDrop');
  if (drop) drop.className = 'm-sel-drop';
  const nameEl = document.getElementById('selName');
  // Show selected member name, or group name when showing all
  if (nameEl) nameEl.textContent = uid
    ? (members[uid]?.name || uid.slice(0,6))
    : (groupData?.name || localStorage.getItem('fl_grp_name') || '');
  // Re-render all markers
  Object.keys(members).forEach(id => {
    if (id !== me.uid) updateMemberMarker(id, members[id]);
  });
  if (uid) flyToMember(uid);
}

// Close selector on map click
document.addEventListener('click', e => {
  const sel = document.getElementById('memberSel');
  if (sel && !sel.contains(e.target)) {
    const drop = document.getElementById('selDrop');
    if (drop) drop.className = 'm-sel-drop';
  }
});

  // memsOverlay removed from map — no-op

// Also update my own marker with motion badge
function updateMyMarker(lat, lng, accuracy) {
  if (!mapObj) return;
  const name = myProfile?.name || me?.email || '?';
  const color = colorForUid(me.uid);
  const motionBadge = currentMotion && MOTION_EMOJI[currentMotion]
    ? `<div class="mm-motion">${MOTION_EMOJI[currentMotion]}</div>` : '';
  const icon = L.divIcon({
    className:'', iconSize:[44,44], iconAnchor:[22,22],
    html:`<div class="mm" style="background:${color}">${initials(name)}${motionBadge}</div>`
  });
  if (!myMarker) {
    myMarker = L.marker([lat,lng],{icon,zIndexOffset:1000}).addTo(mapObj)
      .bindPopup(`<b>${esc(name)}</b> ${t('me')}`);
    mapObj.setView([lat,lng],14);
  } else {
    myMarker.setLatLng([lat,lng]);
    myMarker.setIcon(icon);
  }
  if (myAccCircle) mapObj.removeLayer(myAccCircle);
  myAccCircle = L.circle([lat,lng],{radius:accuracy,color:'#1a73e8',fillColor:'#1a73e8',fillOpacity:0.08,weight:1}).addTo(mapObj);
}
