<style>
/* ════════════ VARIABLES ════════════ */
:root{
  --primary:#1a73e8; --primary-d:#1557b0;
  --green:#34a853; --red:#ea4335; --yellow:#fbbc04;
  --bg:#f1f3f4; --bg2:#ffffff; --bg3:#e8eaed;
  --text:#202124; --text2:#5f6368;
  --border:#dadce0; --card:#ffffff;
  --shadow:0 2px 10px rgba(0,0,0,.12);
  --nav:64px; --hdr:56px;
  --radius:14px;
}
[data-theme="dark"]{
  --bg:#0f0f0f; --bg2:#1c1c1e; --bg3:#2c2c2e;
  --text:#f5f5f7; --text2:#8e8e93;
  --border:#3a3a3c; --card:#1c1c1e;
  --shadow:0 2px 10px rgba(0,0,0,.5);
}
/* ════════════ BASE ════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Heebo',-apple-system,sans-serif;background:var(--bg);color:var(--text)}
[hidden]{display:none!important}
button{font-family:inherit;cursor:pointer}

/* ════════════ LOADING ════════════ */
#vLoading{
  position:fixed;inset:0;
  background:linear-gradient(135deg,#1a73e8,#0d47a1);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;transition:opacity .5s;
}
.ll{font-size:80px;animation:bounce 1.8s ease-in-out infinite}
.lt{color:#fff;font-size:28px;font-weight:900;margin-top:16px}
.ls{color:rgba(255,255,255,.7);font-size:14px;margin-top:8px}
.lver{color:rgba(255,255,255,.4);font-size:11px;font-weight:800;margin-top:8px;letter-spacing:1px}
.lsp{width:38px;height:38px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin-top:28px}
@keyframes bounce{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-14px) rotate(4deg)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ════════════ AUTH ════════════ */
#vAuth{
  position:fixed;inset:0;overflow-y:auto;
  background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;
}
.al{font-size:64px;margin-bottom:12px}
.at{font-size:26px;font-weight:900;text-align:center}
.as{font-size:14px;color:var(--text2);text-align:center;margin:8px 0 28px}
.acard{background:var(--card);border-radius:var(--radius);padding:22px;width:100%;max-width:400px;box-shadow:var(--shadow)}
.atabs{display:flex;background:var(--bg3);border-radius:10px;overflow:hidden;margin-bottom:18px}
.atab{flex:1;padding:10px;text-align:center;cursor:pointer;font-weight:700;font-size:14px;transition:background .2s}
.atab.on{background:var(--primary);color:#fff}

/* ════════════ FORMS ════════════ */
.fg{margin-bottom:14px}
.fl{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px;display:block}
.fi{
  width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;
  font-size:15px;font-family:inherit;background:var(--bg);color:var(--text);
  direction:inherit;transition:border-color .2s;
}
.fi:focus{outline:none;border-color:var(--primary)}

/* ════════════ BUTTONS ════════════ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 18px;border:none;border-radius:10px;font-size:15px;font-weight:700;
  font-family:inherit;cursor:pointer;transition:opacity .15s,transform .1s;width:100%;
}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-p{background:var(--primary);color:#fff}
.btn-s{background:var(--bg3);color:var(--text)}
.btn-r{background:var(--red);color:#fff}
.btn-g{background:var(--green);color:#fff}
.btn-sm{padding:8px 14px;font-size:13px;width:auto}
.btn-ico{padding:10px;width:40px;height:40px;border-radius:50%}
.mt16{margin-top:16px}

/* ════════════ APP SHELL ════════════ */
#vApp{position:fixed;inset:0;display:flex;flex-direction:column}
.hdr{
  height:var(--hdr);background:var(--card);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;
  box-shadow:var(--shadow);z-index:200;
  padding-top:env(safe-area-inset-top);
}
.hdr-title{flex:1;font-size:18px;font-weight:900}
.hdr-ver{font-size:10px;opacity:.4;font-weight:800}

/* ════════════ TAB CONTENT ════════════ */
.tc{flex:1;overflow:hidden;position:relative}
.tp{position:absolute;inset:0;overflow-y:auto;display:none}
.tp.on{display:block}

/* ════════════ BOTTOM NAV ════════════ */
#bnav{
  height:var(--nav);background:var(--card);border-top:1px solid var(--border);
  display:flex;align-items:center;flex-shrink:0;
  padding-bottom:env(safe-area-inset-bottom);
}
.nb{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;padding:8px;cursor:pointer;background:none;border:none;font-family:inherit;
}
.nb.on .ni{filter:none}
.nb.on .nl{color:var(--primary);font-weight:700}
.ni{font-size:22px}
.nl{font-size:10px;color:var(--text2)}

/* ════════════ MAP ════════════ */
#tp-map{padding:0}
#map{width:100%;height:100%}
#map-top-right{
  position:absolute;top:12px;right:12px;z-index:1001;
  display:flex;gap:6px;align-items:center;
}
.m-priv{
  background:var(--card);border:none;border-radius:10px;padding:8px 14px;
  font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;
  box-shadow:var(--shadow);display:flex;align-items:center;gap:6px;color:var(--text);
}
.m-priv.hid{background:var(--red);color:#fff}
/* ── INSTALL BANNER (with custom icon) ── */
#installBanner{
  position:fixed;bottom:calc(var(--nav) + 12px);left:12px;right:12px;
  background:linear-gradient(135deg,#1565c0,#1976d2);color:#fff;
  border-radius:16px;padding:12px 14px;display:none;
  align-items:center;gap:12px;z-index:3001;
  box-shadow:0 4px 20px rgba(25,118,210,.4);
  animation:slideUp .4s ease;
}
.ib-icon{
  width:48px;height:48px;border-radius:12px;flex-shrink:0;overflow:hidden;
  background:#fff;display:flex;align-items:center;justify-content:center;
}
.ib-icon img{width:44px;height:44px;border-radius:10px;object-fit:cover}
.ib-txt{flex:1;min-width:0}
.ib-txt strong{font-size:14px;display:block;font-weight:800}
.ib-txt span{font-size:11px;opacity:.85}
.ib-yes{padding:8px 16px;background:#fff;color:#1565c0;border:none;border-radius:10px;font-weight:800;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap}
.ib-no{padding:8px 10px;background:rgba(255,255,255,.2);border:none;border-radius:10px;color:#fff;font-size:13px;cursor:pointer}
/* Map FAB buttons — bottom LEFT, above zoom */
.map-fabs{position:absolute;bottom:160px;left:14px;z-index:1000;display:flex;flex-direction:column;gap:8px}
.map-fab-btn{
  width:46px;height:46px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:20px;
  box-shadow:0 3px 12px rgba(0,0,0,.25);font-family:inherit;
}
.map-fab-center{background:var(--primary);color:#fff}
.map-fab-add{background:var(--green);color:#fff;font-size:26px;font-weight:900}
/* Leaflet zoom bottom-left */
.leaflet-top.leaflet-left{display:none}
.leaflet-bottom.leaflet-right .leaflet-control-zoom{display:none}
.leaflet-bottom.leaflet-left .leaflet-control-zoom{margin-bottom:100px;margin-left:14px}
.add-hint{
  position:absolute;bottom:80px;left:50%;transform:translateX(-50%);z-index:1000;
  background:rgba(0,0,0,.75);color:#fff;padding:10px 20px;border-radius:20px;
  font-size:14px;font-weight:700;white-space:nowrap;
  display:flex;align-items:center;gap:8px;
}
.add-hint button{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:4px 10px;font-family:inherit;font-size:12px;cursor:pointer}
/* Member marker */
.mm{
  border:3px solid #fff;border-radius:50%;width:44px;height:44px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:900;color:#fff;
  box-shadow:0 2px 8px rgba(0,0,0,.35);cursor:pointer;position:relative;
}
.mm-motion{
  position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);
  font-size:13px;background:#fff;border-radius:10px;padding:0 3px;
  box-shadow:0 1px 4px rgba(0,0,0,.3);line-height:18px;
}
/* Metrics tab */
.metric-card{
  background:var(--card);border-radius:var(--radius);padding:16px;
  margin-bottom:10px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px;
}
.metric-av{
  width:48px;height:48px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:17px;font-weight:900;color:#fff;flex-shrink:0;
}
.metric-name{font-size:15px;font-weight:700}
.metric-row{display:flex;gap:16px;margin-top:6px;flex-wrap:wrap}
.metric-val{font-size:13px;color:var(--text2)}
.metric-val b{color:var(--text);font-size:15px}
.metric-btns{display:flex;gap:6px;margin-top:8px}
/* Log entry */
.log-entry{
  background:var(--card);border-radius:12px;padding:12px 14px;
  margin-bottom:8px;box-shadow:var(--shadow);
  display:flex;align-items:flex-start;gap:12px;
}
.log-dot{width:10px;height:10px;border-radius:50%;background:var(--primary);margin-top:4px;flex-shrink:0}
.log-addr{font-size:14px;font-weight:600}
.log-time{font-size:12px;color:var(--text2);margin-top:3px}
/* Route legend */
.route-stop-marker{
  background:var(--primary);color:#fff;border-radius:50%;
  width:24px;height:24px;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:900;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3);
}
/* Member selector on map */
.m-sel{
  position:absolute;top:12px;left:12px;z-index:1001;
}
.m-sel-btn{
  background:var(--card);border:none;border-radius:10px;padding:8px 12px;
  font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;
  box-shadow:var(--shadow);display:flex;align-items:center;gap:6px;color:var(--text);
}
.m-sel-drop{
  position:absolute;top:44px;left:0;background:var(--card);
  border-radius:12px;box-shadow:var(--shadow);min-width:160px;overflow:hidden;
  display:none;
}
.m-sel-drop.open{display:block}
.m-sel-item{
  display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;
  font-size:13px;font-weight:600;border-bottom:1px solid var(--border);
}
.m-sel-item:last-child{border-bottom:none}
.m-sel-item:active{background:var(--bg3)}
.m-sel-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
/* Notifications toggle row in settings */
.notif-row{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--card)}
.notif-row .si-ico{font-size:20px}
.notif-row .si-txt{flex:1;font-size:14px;font-weight:500}
/* Point marker */
.pm{
  background:var(--red);border:2px solid #fff;
  border-radius:50% 50% 50% 0;width:28px;height:28px;
  transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 6px rgba(0,0,0,.3);
}
.pm-inner{transform:rotate(45deg);font-size:12px}
/* Members overlay */
#mems-overlay{position:absolute;top:12px;left:12px;z-index:999;display:flex;flex-direction:column;gap:6px;max-width:150px}
.mem-chip{
  background:var(--card);border-radius:20px;padding:5px 10px 5px 6px;
  display:flex;align-items:center;gap:7px;cursor:pointer;
  box-shadow:var(--shadow);font-size:12px;
}
.mem-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.mem-name{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mem-time{font-size:10px;color:var(--text2)}

/* ════════════ SECTIONS ════════════ */
.sec{padding:16px}
.sec-h{font-size:15px;font-weight:800;color:var(--text);margin-bottom:12px}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:12px}
.ci{
  display:flex;align-items:center;gap:12px;padding:14px 16px;
  border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;
}
.ci:last-child{border-bottom:none}
.ci:active{background:var(--bg3)}
.cii{font-size:22px;flex-shrink:0}
.cib{flex:1;min-width:0}
.cit{font-size:15px;font-weight:600}
.cis{font-size:12px;color:var(--text2);margin-top:2px}

/* ════════════ MEMBERS (GROUP TAB) ════════════ */
.mc{
  background:var(--card);border-radius:var(--radius);padding:14px 16px;
  margin-bottom:10px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;
}
.mav{
  width:46px;height:46px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:18px;font-weight:900;color:#fff;flex-shrink:0;
}
.mn{font-size:15px;font-weight:700}
.ms{font-size:12px;color:var(--text2);margin-top:3px}
.badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700}
.bdg-p{background:rgba(26,115,232,.15);color:var(--primary)}
.bdg-a{background:rgba(52,168,83,.15);color:var(--green)}
.bdg-r{background:rgba(234,67,53,.15);color:var(--red)}

/* ════════════ PERMISSIONS ════════════ */
.perm-row{
  display:flex;align-items:center;gap:10px;
  background:var(--bg2);border-radius:10px;padding:10px 14px;margin-bottom:8px;
}
.perm-name{flex:1;font-size:14px;font-weight:600}
/* Toggle switch */
.sw{position:relative;width:46px;height:26px;flex-shrink:0}
.sw input{opacity:0;width:0;height:0}
.sw-sl{
  position:absolute;inset:0;background:var(--border);border-radius:13px;cursor:pointer;
  transition:background .2s;
}
.sw-sl::after{
  content:'';position:absolute;width:20px;height:20px;background:#fff;
  border-radius:50%;top:3px;left:3px;transition:transform .2s;
  box-shadow:0 1px 3px rgba(0,0,0,.3);
}
.sw input:checked+.sw-sl{background:var(--primary)}
.sw input:checked+.sw-sl::after{transform:translateX(20px)}

/* ════════════ ONBOARD ════════════ */
#vOnboard{
  position:fixed;inset:0;background:var(--bg);overflow-y:auto;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;
}
.ol{font-size:72px;margin-bottom:20px}
.ot{font-size:24px;font-weight:900;text-align:center;margin-bottom:8px}
.os{font-size:14px;color:var(--text2);text-align:center;margin-bottom:28px}
.oo{
  background:var(--card);border:2px solid var(--border);border-radius:16px;
  padding:20px;cursor:pointer;transition:border-color .2s,transform .1s;
  display:flex;align-items:center;gap:16px;width:100%;max-width:380px;
  margin-bottom:12px;
}
.oo:active{transform:scale(.98)}
.oo:hover{border-color:var(--primary)}
.oo-ico{font-size:36px}
.oo-h{font-size:16px;font-weight:800}
.oo-s{font-size:13px;color:var(--text2);margin-top:4px}

/* ════════════ CODE DISPLAY ════════════ */
.code-box{
  background:var(--bg3);border-radius:12px;padding:16px 20px;text-align:center;
  letter-spacing:6px;font-size:30px;font-weight:900;color:var(--primary);
  font-family:monospace;user-select:all;cursor:pointer;
}

/* ════════════ MODAL ════════════ */
.mov{
  position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:3000;
  display:flex;align-items:flex-end;justify-content:center;
}
.msh{
  background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:520px;
  max-height:88vh;overflow-y:auto;padding:20px;animation:slideUp .3s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhnd{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.mttl{font-size:18px;font-weight:900;margin-bottom:16px}

/* ════════════ SETTINGS ════════════ */
.sg{margin-bottom:18px}
.sl{font-size:11px;font-weight:800;color:var(--text2);margin-bottom:7px;padding:0 4px;letter-spacing:.5px}
.si{
  background:var(--card);display:flex;align-items:center;gap:12px;
  padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;
}
.si:first-of-type{border-radius:14px 14px 0 0}
.si:last-of-type{border-radius:0 0 14px 14px;border-bottom:none}
.si:only-of-type{border-radius:14px;border-bottom:none}
.si-ico{font-size:20px}
.si-txt{flex:1;font-size:14px;font-weight:500}
.si-val{font-size:13px;color:var(--text2)}

/* ════════════ FAB ════════════ */
.fab{
  position:fixed;bottom:calc(var(--nav)+16px);right:20px;
  width:54px;height:54px;border-radius:50%;border:none;
  background:var(--primary);color:#fff;font-size:26px;cursor:pointer;
  box-shadow:0 4px 16px rgba(26,115,232,.4);
  display:flex;align-items:center;justify-content:center;z-index:500;
  transition:transform .2s;
}
.fab:active{transform:scale(.92)}

/* ════════════ TOAST ════════════ */
#toast{
  position:fixed;bottom:calc(var(--nav)+16px);left:50%;
  transform:translateX(-50%) translateY(140px);
  opacity:0;pointer-events:none;
  background:#333;color:#fff;padding:11px 16px 11px 20px;border-radius:999px;
  font-size:14px;font-weight:600;z-index:8000;
  transition:transform .35s ease, opacity .35s ease;
  white-space:normal;word-break:break-word;
  max-width:calc(100vw - 40px);display:flex;align-items:center;gap:10px;
}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;pointer-events:auto}
#toast.ok{background:#1b5e20}
#toast.err{background:var(--red)}
.toast-x{background:none;border:none;color:inherit;font-size:20px;line-height:1;cursor:pointer;opacity:.75;padding:0;flex-shrink:0}

/* ════════════ EMPTY ════════════ */
.empty{text-align:center;padding:48px 20px;color:var(--text2)}
.ei{font-size:54px;margin-bottom:12px}
.et{font-size:17px;font-weight:700;color:var(--text)}
.es{font-size:13px;margin-top:6px}

/* ════════════ CONFETTI ════════════ */
.cfw{position:fixed;inset:0;pointer-events:none;z-index:9998;overflow:hidden}
@keyframes cfFall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}
.cf{position:absolute;animation:cfFall linear forwards}

/* ════════════ MISC ════════════ */
.row{display:flex;gap:8px}
.flex1{flex:1}
select.lang-sel{
  padding:8px 12px;border:none;background:transparent;
  font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;color:var(--text);
}
.divider{height:1px;background:var(--border);margin:12px 0}
.point-row{
  display:flex;align-items:center;gap:12px;
  background:var(--card);border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);
}
.point-ico{font-size:26px;flex-shrink:0}
.point-info{flex:1}
.point-name{font-size:15px;font-weight:700}
.point-sub{font-size:12px;color:var(--text2);margin-top:3px}
.point-actions{display:flex;gap:6px}
.small-btn{
  background:var(--bg3);border:none;border-radius:8px;padding:7px 12px;
  font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;color:var(--text);
}
.small-btn.del{background:rgba(234,67,53,.15);color:var(--red)}
@media print{.no-print{display:none!important}}

/* ════════════ ANIMATED MARKERS ════════════ */
@keyframes markerPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(26,115,232,.5),0 2px 8px rgba(0,0,0,.35)}
  50%{box-shadow:0 0 0 10px rgba(26,115,232,0),0 2px 8px rgba(0,0,0,.35)}
}
.mm.moving{animation:markerPulse 1.6s ease-in-out infinite}

/* ════════════ STATUS BADGE ════════════ */
.status-badge{
  position:absolute;top:-6px;right:-6px;
  font-size:12px;background:#fff;border-radius:50%;
  width:20px;height:20px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 1px 4px rgba(0,0,0,.3);
}
.mm{position:relative;overflow:hidden}
.mm-photo{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block}

/* ════════════ SOS ════════════ */
.sos-fab{
  position:absolute;bottom:220px;right:14px;z-index:1001;
  width:50px;height:50px;border-radius:50%;border:none;
  background:#c62828;color:#fff;font-size:13px;font-weight:900;cursor:pointer;
  box-shadow:0 4px 18px rgba(198,40,40,.5);
  display:flex;align-items:center;justify-content:center;font-family:inherit;
  transition:transform .15s;
}
.sos-fab:active{transform:scale(.92)}
@keyframes sosPulse{0%,100%{box-shadow:0 4px 18px rgba(198,40,40,.5)}
  50%{box-shadow:0 4px 28px rgba(198,40,40,.85),0 0 0 14px rgba(198,40,40,.12)}}
.sos-active .sos-fab{animation:sosPulse 1s ease-in-out infinite}
.sos-marker{
  background:#c62828;color:#fff;border:3px solid #fff;
  border-radius:50%;width:46px;height:46px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:900;
  box-shadow:0 2px 12px rgba(198,40,40,.6);
}

/* ════════════ QUIET MODE ════════════ */
.m-priv.quiet{background:#f57c00;color:#fff}

/* ════════════ CHAT ════════════ */
#tp-chat{display:none;flex-direction:column;padding:0;overflow:hidden}
#tp-chat.on{display:flex}
.chat-msgs{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.chat-input-bar{
  padding:10px 12px;background:var(--card);border-top:1px solid var(--border);
  display:flex;gap:8px;align-items:center;
  padding-bottom:calc(10px + env(safe-area-inset-bottom));
}
.chat-input{
  flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:24px;
  font-size:14px;font-family:inherit;background:var(--bg);color:var(--text);
  resize:none;outline:none;line-height:1.4;max-height:100px;
}
.chat-input:focus{border-color:var(--primary)}
.chat-send{
  width:42px;height:42px;border-radius:50%;border:none;
  background:var(--primary);color:#fff;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.msg-bubble{
  max-width:78%;padding:9px 13px;border-radius:16px;
  font-size:14px;line-height:1.45;word-break:break-word;
}
.msg-mine{align-self:flex-end;background:var(--primary);color:#fff;border-bottom-right-radius:4px}
.msg-theirs{align-self:flex-start;background:var(--card);color:var(--text);border-bottom-left-radius:4px;box-shadow:var(--shadow)}
.msg-sos{align-self:center;background:#c62828;color:#fff;border-radius:12px;font-weight:800;text-align:center}
.msg-name{font-size:10px;font-weight:700;margin-bottom:3px;opacity:.7}
.msg-time{font-size:10px;opacity:.55;margin-top:3px;text-align:right}
.chat-badge{
  position:absolute;top:4px;right:4px;background:var(--red);color:#fff;
  border-radius:50%;width:16px;height:16px;font-size:10px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
}
#nb-chat{position:relative}

/* ════════════ STATUS PICKER ════════════ */
.status-picker{
  position:absolute;top:58px;right:12px;z-index:1002;
  background:var(--card);border-radius:12px;padding:6px;box-shadow:var(--shadow);
  display:none;flex-direction:column;gap:4px;min-width:150px;
}
.status-picker.open{display:flex}
.status-item{
  display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;
  cursor:pointer;font-size:13px;font-weight:600;transition:background .15s;
}
.status-item:hover,.status-item.active{background:var(--bg3)}
.status-btn{
  background:var(--card);border:none;border-radius:10px;padding:7px 12px;
  font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;
  box-shadow:var(--shadow);display:flex;align-items:center;gap:6px;color:var(--text);
}

/* ════════════ ETA ════════════ */
.eta-chip{
  background:var(--primary);color:#fff;border-radius:8px;
  padding:3px 8px;font-size:11px;font-weight:700;display:inline-block;margin-top:4px;
}

/* ════════════ BATTERY ════════════ */
.batt-chip{font-size:11px;color:var(--text2);margin-top:2px}

/* ════════════ SOS BANNER ════════════ */
#sos-banner{
  display:none;position:fixed;top:0;left:0;right:0;z-index:9100;
  background:#c62828;color:#fff;padding:10px 16px;
  font-size:14px;font-weight:700;text-align:center;
}
@keyframes sosBannerPulse{0%,100%{background:#c62828}50%{background:#7f0000}}
#sos-banner.active{display:block;animation:sosBannerPulse 1.2s ease-in-out infinite}
.sos-banner-row{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap}
.sos-banner-close{background:rgba(255,255,255,.25);border:none;color:#fff;border-radius:6px;
  padding:3px 10px;cursor:pointer;font-family:inherit;font-weight:700;font-size:13px}

/* SOS double-tap confirm ring */
.sos-confirm-ring{
  position:absolute;inset:-6px;border-radius:50%;
  border:3px solid #fff;animation:sosRing .6s linear infinite;pointer-events:none;
}
@keyframes sosRing{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.5)}}

/* ════════════ CHAT DM ════════════ */
.msg-dm{border:2px solid var(--primary)!important}
.msg-dm-badge{
  font-size:10px;background:var(--primary);color:#fff;
  border-radius:4px;padding:1px 5px;margin-bottom:3px;display:inline-block;
}
.chat-to-bar{
  display:flex;align-items:center;gap:8px;padding:6px 12px;
  border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;
}
.chat-to-lbl{font-size:12px;font-weight:700;color:var(--text2);white-space:nowrap}
.chat-to-sel{
  flex:1;border:1px solid var(--border);border-radius:8px;padding:5px 8px;
  font-family:inherit;font-size:13px;background:var(--card);color:var(--text);
}

/* ════════════ NOTIFICATIONS BADGE ════════════ */
.notif-badge{
  background:var(--red);color:#fff;border-radius:50%;
  width:18px;height:18px;font-size:10px;font-weight:900;
  display:inline-flex;align-items:center;justify-content:center;
  position:absolute;top:-4px;right:-4px;
}
.notif-item{
  padding:10px 14px;border-bottom:1px solid var(--border);
  display:flex;flex-direction:column;gap:3px;
}
.notif-item:last-child{border-bottom:none}
.notif-time{font-size:11px;color:var(--text2)}

/* ════════════ GROUP COLLAPSE ════════════ */
.grp-section-hdr{
  display:flex;align-items:center;gap:8px;padding:10px 14px;
  background:var(--bg3);border-radius:10px;cursor:pointer;
  font-weight:700;font-size:14px;margin-bottom:6px;user-select:none;
}
.grp-section-hdr .arr{transition:transform .2s;display:inline-block}
.grp-section-hdr.collapsed .arr{transform:rotate(180deg)}
.grp-section-body{overflow:hidden;transition:max-height .3s ease}

/* ════════════ LOG MEMBER SELECTOR ════════════ */
.log-member-bar{
  display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;
}
.log-member-bar label{font-size:12px;font-weight:700;color:var(--text2)}
.log-member-sel{
  border:1px solid var(--border);border-radius:8px;padding:5px 10px;
  font-family:inherit;font-size:13px;background:var(--card);color:var(--text);
}
</style>
</head>
<body>

<!-- ══════════ SPLASH ══════════ -->
<div id="vLoading">
  <div class="ll">📍</div>
  <div class="lt" id="lTitle">Family Location</div>
  <div class="ls" id="lSub">מעקב מיקום משפחתי</div>
  <div class="lver" id="lVer">v1.0.5</div>
  <div class="lsp"></div>
</div>

<!-- ══════════ AUTH ══════════ -->
<div id="vAuth" hidden>
  <div class="al">📍</div>
  <div class="at">Family Location</div>
  <div class="as" id="aSubT">מעקב מיקום משפחתי חכם</div>
  <div style="font-size:11px;color:var(--text2);font-weight:800;margin-bottom:12px">v<span id="verAuth">1.0.5</span></div>
  <div class="acard">
    <div class="atabs">
      <div class="atab on" id="tabLogin" onclick="switchAuthTab('login')" id="tabLoginBtn"></div>
      <div class="atab" id="tabReg" onclick="switchAuthTab('reg')" id="tabRegBtn"></div>
    </div>
    <div id="formLogin">
      <div class="fg"><label class="fl" id="lEmail"></label>
        <input class="fi" type="email" id="iEmail" autocomplete="email"></div>
      <div class="fg"><label class="fl" id="lPass"></label>
        <input class="fi" type="password" id="iPass" autocomplete="current-password"
          onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn btn-p" onclick="doLogin()" id="bLogin"></button>
    </div>
    <div id="formReg" hidden>
      <div class="fg"><label class="fl" id="lName"></label>
        <input class="fi" type="text" id="iName" autocomplete="name"></div>
      <div class="fg"><label class="fl" id="lEmail2"></label>
        <input class="fi" type="email" id="iEmail2" autocomplete="email"></div>
      <div class="fg"><label class="fl" id="lPass2"></label>
        <input class="fi" type="password" id="iPass2" autocomplete="new-password"
          onkeydown="if(event.key==='Enter')doRegister()"></div>
      <button class="btn btn-p" onclick="doRegister()" id="bReg"></button>
    </div>
    <div class="divider"></div>
    <button class="btn btn-s" onclick="doGoogle()" id="bGoogle"></button>
  </div>
  <div class="mt16">
    <select class="lang-sel" onchange="setLang(this.value)" id="langAuth">
      <option value="he">🇮🇱 עברית</option>
      <option value="en">🇺🇸 English</option>
      <option value="ru">🇷🇺 Русский</option>
    </select>
  </div>
</div>

<!-- ══════════ ONBOARD ══════════ -->
<div id="vOnboard" hidden>
  <div class="ol">👨‍👩‍👧‍👦</div>
  <div class="ot" id="obTitle"></div>
  <div class="os" id="obSub"></div>
  <div style="font-size:11px;color:var(--text2);font-weight:800;margin-bottom:16px">v<span id="verOnboard">1.0.5</span></div>
  <div class="oo" onclick="showCreateGroup()">
    <div class="oo-ico">➕</div>
    <div><div class="oo-h" id="obCreate"></div><div class="oo-s" id="obCreateS"></div></div>
  </div>
  <div class="oo" onclick="showJoinInput()">
    <div class="oo-ico">🔗</div>
    <div><div class="oo-h" id="obJoin"></div><div class="oo-s" id="obJoinS"></div></div>
  </div>
  <div id="obCreate2" hidden style="width:100%;max-width:380px;margin-top:4px">
    <div class="fg"><label class="fl" id="lGrpName"></label>
      <input class="fi" type="text" id="iGrpName" maxlength="40"></div>
    <button class="btn btn-g" onclick="doCreateGroup()" id="bCreateGrp"></button>
    <button class="btn btn-s mt16" onclick="hideCreateGroup()" style="margin-top:8px" id="bBackOB"></button>
  </div>
  <div id="obJoin2" hidden style="width:100%;max-width:380px;margin-top:4px">
    <div class="fg">
      <input class="fi" type="text" id="iJoinCode" maxlength="8"
        style="text-align:center;letter-spacing:4px;font-size:22px;text-transform:uppercase"
        placeholder="XXXXXXXX" oninput="this.value=this.value.toUpperCase()">
    </div>
    <button class="btn btn-p" onclick="doJoinGroup()" id="bJoin"></button>
    <button class="btn btn-s" onclick="hideJoinInput()" style="margin-top:8px" id="bBackOB2"></button>
  </div>
  <button class="btn btn-s mt16" onclick="doLogout()" style="max-width:200px;margin-top:12px" id="bObLogout"></button>
</div>

<!-- Install Banner (shows ONLY when Chrome fires beforeinstallprompt) -->
<div id="installBanner">
  <div class="ib-icon">
    <img src="icon-192.png" alt="Family Location" onerror="this.style.display='none';this.parentNode.innerHTML='📍'">
  </div>
  <div class="ib-txt">
    <strong>Family Location</strong>
    <span>התקן כאפליקציה על הטלפון</span>
  </div>
  <div style="display:flex;gap:6px;flex-shrink:0">
    <button class="ib-yes" onclick="doInstall()">התקן</button>
    <button class="ib-no" onclick="dismissInstall()">✕</button>
  </div>
</div>

<!-- ══════════ APP ══════════ -->
<div id="vApp" hidden>
  <!-- Header -->
  <div class="hdr no-print">
    <span style="font-size:22px">📍</span>
    <span class="hdr-title" id="hdrTitle"></span>
    <span class="hdr-ver">v<span id="verBadge">1.0.0</span></span>
    <button class="btn-ico btn btn-s" onclick="toggleTheme()" id="themeBtn" style="background:var(--bg3)">🌙</button>
  </div>

  <!-- Tab content -->
  <div class="tc">

    <!-- MAP -->
    <div class="tp on" id="tp-map">
      <div id="map"></div>
      <!-- Top-right: status + privacy in one flex row (no overlap) -->
      <div id="map-top-right" class="no-print">
        <button class="status-btn" id="statusBtn" onclick="toggleStatusPicker()">
          <span id="statusIco">🟢</span>
        </button>
        <button class="m-priv" id="privBtn" onclick="cyclePrivacy()">
          <span id="privIco">👁️</span><span id="privLbl"></span>
        </button>
      </div>
      <div class="status-picker no-print" id="statusPicker"></div>
      <!-- Member/group selector top-left -->
      <div class="m-sel no-print" id="memberSel" style="top:56px">
        <button class="m-sel-btn" onclick="toggleMemberSel()">
          <span id="selIcon">👥</span>
          <span id="selName" style="font-size:11px;font-weight:800"></span>
        </button>
        <div class="m-sel-drop" id="selDrop"></div>
      </div>
      <!-- Right-side FABs -->
      <div class="no-print" style="position:absolute;top:52px;right:12px;z-index:1000;display:flex;flex-direction:column;gap:8px">
        <button onclick="centerOnMe()" title="מרכז עליי"
          style="width:42px;height:42px;border-radius:50%;border:none;
                 background:var(--primary);color:#fff;font-size:18px;cursor:pointer;
                 box-shadow:0 3px 10px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center">🎯</button>
        <button onclick="startAddPoint()" title="הוסף נקודה"
          style="width:42px;height:42px;border-radius:50%;border:none;
                 background:var(--green);color:#fff;font-size:22px;font-weight:900;cursor:pointer;
                 box-shadow:0 3px 10px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center">＋</button>
      </div>
      <!-- SOS button — double-tap protection -->
      <button class="sos-fab no-print" id="sosFab" onclick="triggerSOS()">🆘<span id="sosRing" hidden class="sos-confirm-ring"></span></button>
      <!-- Add point hint -->
      <div class="add-hint no-print" id="addHint" hidden>
        <span id="addHintTxt"></span>
        <button onclick="cancelAddPoint()">✕</button>
      </div>
    </div>

    <!-- CHAT -->
    <div class="tp" id="tp-chat" style="flex-direction:column">
      <div class="chat-msgs" id="chatMsgs"></div>
      <div class="chat-to-bar">
        <span class="chat-to-lbl" id="chatToLbl">→</span>
        <select class="chat-to-sel" id="chatToSel" onchange="setChatTo(this.value)">
          <option value="">כולם</option>
        </select>
      </div>
      <div class="chat-input-bar">
        <textarea class="chat-input" id="chatInput" rows="1" placeholder="הודעה..."
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChatMsg()}"></textarea>
        <button class="chat-send" onclick="sendChatMsg()">➤</button>
      </div>
    </div>

    <!-- POINTS -->
    <div class="tp" id="tp-points">
      <div class="sec">
        <div class="sec-h" id="ptTitle"></div>
        <div id="ptList"></div>
      </div>
    </div>

    <!-- GROUP -->
    <div class="tp" id="tp-group">
      <div class="sec">
        <div id="grpInfoCard"></div>
        <div class="sec-h" id="memsTitleEl" style="margin-top:16px"></div>
        <div id="grpMembers"></div>
        <div class="sec-h" id="permTitleEl" style="margin-top:8px"></div>
        <div class="os" id="permDesc" style="margin-bottom:10px;text-align:right"></div>
        <div id="permsList"></div>
      </div>
    </div>

    <!-- METRICS / MOVEMENT -->
    <div class="tp" id="tp-metrics">
      <div class="sec">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
          <div class="sec-h" id="metTitle" style="margin-bottom:0;flex:1"></div>
          <button onclick="shiftMetricsDate(-1)" title="יום קודם"
            style="width:32px;height:32px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);
                   color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center">◀</button>
          <input type="date" id="metDatePicker"
            style="border:1.5px solid var(--border);border-radius:10px;padding:7px 10px;
                   font-family:inherit;font-size:13px;background:var(--card);color:var(--text);cursor:pointer"
            onchange="loadMetrics()">
          <button onclick="shiftMetricsDate(1)" title="יום הבא"
            style="width:32px;height:32px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);
                   color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center">▶</button>
        </div>
        <div id="metList"></div>
        <div class="sec-h" id="logTitleEl" style="margin-top:16px"></div>
        <div id="logMemberBar" class="log-member-bar" style="display:none">
          <label id="logMemberLbl"></label>
          <select class="log-member-sel" id="logMemberSel" onchange="onLogMemberChange(this.value)"></select>
        </div>
        <div id="logList"></div>
      </div>
    </div>

    <!-- SETTINGS -->
    <div class="tp" id="tp-settings">
      <div class="sec">

        <div class="sg">
          <div class="sl" id="sAccLbl"></div>
          <div class="si" onclick="editProfile()">
            <span class="si-ico">👤</span>
            <span class="si-txt" id="sProfile"></span>
            <span class="si-val" id="sMyName"></span>
          </div>
        </div>

        <div class="sg">
          <div class="sl" id="sDispLbl"></div>
          <div class="si" onclick="toggleTheme()">
            <span class="si-ico" id="sThemeIco">🌙</span>
            <span class="si-txt" id="sThemeTxt"></span>
            <span class="si-val" id="sThemeVal"></span>
          </div>
          <div class="si">
            <span class="si-ico">🌐</span>
            <span class="si-txt" id="sLangTxt"></span>
            <select class="lang-sel" onchange="setLang(this.value)" id="langSett">
              <option value="he">🇮🇱 עברית</option>
              <option value="en">🇺🇸 English</option>
              <option value="ru">🇷🇺 Русский</option>
            </select>
          </div>
        </div>

        <div class="sg">
          <div class="sl" id="sTrackLbl"></div>
          <div class="si" style="cursor:default">
            <span class="si-ico">🔔</span>
            <span class="si-txt" id="sNotif"></span>
            <label class="sw">
              <input type="checkbox" id="notifToggle" onchange="toggleNotifications(this.checked)">
              <span class="sw-sl"></span>
            </label>
          </div>
        </div>

        <div class="sg" id="sgInstall">
          <div class="sl" id="sInstLbl">התקנה</div>
          <!-- Always visible install button -->
          <div class="si" id="siInstallAlways" onclick="doInstallOrHelp()" style="cursor:pointer">
            <span class="si-ico">📲</span>
            <span class="si-txt" id="sInstallAlwaysLbl">התקן אפליקציה</span>
          </div>
          <!-- Already installed (replaces above when standalone) -->
          <div class="si" id="siInstalled" style="display:none;cursor:default">
            <span class="si-ico">✅</span>
            <span class="si-txt" id="sInstalled">מותקן על המכשיר</span>
          </div>
        </div>

        <div class="sg">
          <div class="sl" id="sGrpLbl"></div>

function colorForUid(uid) {
  let h = 0;
  for (let c of uid) h = (h * 31 + c.charCodeAt(0)) & 0xffffff;

}

async function initFirebase() {
  try {
    if (!firebase.apps.length) {
      firebase.initializeApp(FIREBASE_CONFIG);
    }
    auth = firebase.auth();
    db   = firebase.firestore();

    // Fallback: if onAuthStateChanged never fires within 8s, show auth
    const splashTimeout = setTimeout(() => {
      hideSplash(); showView('vAuth'); renderUI();
    }, 8000);

    auth.onAuthStateChanged(user => {
      clearTimeout(splashTimeout);
      onAuth(user);
    });
  } catch(e) {
    console.error('Firebase init error:', e);
    hideSplash(); showView('vAuth'); renderUI();
    showToast('Firebase error: ' + e.message, 'err');
  }
}

async function onAuth(user) {
  try {
    if (user) {
      me = user;
      // Load or create user profile
      const ref = db.collection('users').doc(me.uid);
      const snap = await ref.get();
      if (!snap.exists) {
        await ref.set({ name: me.displayName || me.email.split('@')[0], email: me.email, createdAt: new Date() });
      }
      myProfile = (await ref.get()).data();
      // Check if user is in a group
      const gSnap = await db.collection('users').doc(me.uid).get();
      const gid = gSnap.data()?.groupId;
      if (gid) {
        groupId = gid;
        await initApp();
      } else {
        showView('vOnboard');
        renderUI();
      }
    } else {
      me = null; myProfile = null; groupId = null;
      showView('vAuth');
      renderUI();
    }
  } catch(e) {
    console.error('onAuth error:', e);
    showView('vAuth');
    renderUI();
    showToast('Error: ' + e.message, 'err');
  }
  hideSplash();
}

async function doLogin() {
  const email = document.getElementById('iEmail').value.trim();
  const pass  = document.getElementById('iPass').value;
  if (!email||!pass) return;
  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch(e) { showToast(t('errLogin')+': '+e.message,'err'); }
}

async function doRegister() {
  const name  = document.getElementById('iName').value.trim();
  const email = document.getElementById('iEmail2').value.trim();
  const pass  = document.getElementById('iPass2').value;
  if (!name||!email||!pass) return;
  try {
    const cred = await auth.createUserWithEmailAndPassword(email, pass);
    await cred.user.updateProfile({ displayName: name });
    await db.collection('users').doc(cred.user.uid).set({ name, email, createdAt: new Date() });
  } catch(e) { showToast(t('errReg')+': '+e.message,'err'); }
}

async function doGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();
  try {
    await auth.signInWithPopup(provider);
  } catch(e) {
    if (e.code === 'auth/popup-blocked') {
      // Mobile fallback
      await auth.signInWithRedirect(provider);
    } else if (e.code !== 'auth/popup-closed-by-user') {
      showToast(t('errLogin') + ': ' + e.message, 'err');
    }
  }
}

async function doLogout() {
  stopTracking();
  unsubAll();
  groupId = null; groupData = null;

async function doCreateGroup() {
  const name = document.getElementById('iGrpName').value.trim() || (myProfile?.name + "'s Family");
  const code = genCode(8);
  try {
    const gRef = db.collection('groups').doc();
    groupId = gRef.id;
    await gRef.set({
      name, adminUid: me.uid,
      members: [me.uid],
      joinCode: code,
      permissions: {},
      createdAt: new Date()
    });
    await db.collection('joinCodes').doc(code).set({ groupId, createdAt: new Date() });
    // Store in groups array (multi-group support)
    await db.collection('users').doc(me.uid).set({
      groupId,
      groups: firebase.firestore.FieldValue.arrayUnion(groupId)
    }, {merge: true});
    confetti();
    showToast(t('okCreate'),'ok');
    await initApp();
  } catch(e) { showToast(e.message,'err'); }
}

async function doJoinGroup() {
  const code = document.getElementById('iJoinCode').value.trim().toUpperCase();
  if (code.length < 4) return;
  try {
    const q = await db.collection('groups').where('joinCode','==',code).limit(1).get();
    if (q.empty) { showToast(t('errJoin'),'err'); return; }
    const grpDoc = q.docs[0];
    groupId = grpDoc.id;
    const existingMembers = grpDoc.data().members || [];
    await db.collection('groups').doc(groupId).update({
      members: firebase.firestore.FieldValue.arrayUnion(me.uid),
      // Auto-approve: all current members can see the new member by default
      [`permissions.${me.uid}`]: existingMembers
    });
    await db.collection('users').doc(me.uid).set({
      groupId,
      groups: firebase.firestore.FieldValue.arrayUnion(groupId)
    }, {merge: true});
    confetti();
    showToast(t('okJoin'),'ok');
    await initApp();
  } catch(e) {
    console.error('Join error:', e);
    showToast(e.message, 'err');
  }
}

function genCode(len) {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:len}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
}

async function loadGroup() {
  if (!groupId) { showView('vOnboard'); renderUI(); return; }
  // Load ALL groups the user belongs to
  const allGroupIds = [...new Set([groupId, ...(myProfile?.groups || [])])];
  const grpSnaps = await Promise.all(allGroupIds.map(gid => db.collection('groups').doc(gid).get()));
  allGroupsData = {};
  grpSnaps.forEach(s => { if (s.exists) allGroupsData[s.id] = s.data(); });

  // If ALL groups were deleted — clean up and go to onboarding
  if (Object.keys(allGroupsData).length === 0) {
    await db.collection('users').doc(me.uid).update({
      groupId: firebase.firestore.FieldValue.delete(),
      groups: firebase.firestore.FieldValue.delete()
    }).catch(() => {});
    groupId = null; groupData = null; myGroupsList = [];
    stopTracking(); unsubAll();
    showView('vOnboard');
    renderUI();
    return;
  }

  // If primary groupId was deleted but others exist — switch to first valid one
  if (!allGroupsData[groupId]) {
    groupId = Object.keys(allGroupsData)[0];
    await db.collection('users').doc(me.uid).update({ groupId }).catch(() => {});
  }

  groupData = allGroupsData[groupId] || null;
  myGroupsList = Object.entries(allGroupsData).map(([id, d]) => ({ id, name: d.name || id }));
  renderGroupTab();
  // Subscribe to live updates for ALL groups
  if (unsubGrp) unsubGrp();
  const unsubFns = allGroupIds.map(gid =>
    db.collection('groups').doc(gid).onSnapshot(s => {
      if (s.exists) {
        const prevData = allGroupsData[s.id];
        allGroupsData[s.id] = s.data();
        if (s.id === groupId) {
          groupData = s.data();
          if (groupData?.name) localStorage.setItem('fl_grp_name', groupData.name);
          const gnlEl = document.getElementById('nlGroup');
          if (gnlEl) gnlEl.textContent = t('navGrps');
          const selEl = document.getElementById('selName');
          if (selEl && !focusedMember) selEl.textContent = groupData?.name || '';
        }
        myGroupsList = Object.entries(allGroupsData).map(([id, d]) => ({ id, name: d.name || id }));

        // Detect SOS broadcast via group document field
        const newD = s.data();
        const bannerKey = 'grp_' + gid;
        if (newD.sosActive && !prevData?.sosActive && newD.sosUid !== me?.uid) {
          activeSosBanners[bannerKey] = { name: newD.sosName || '?', uid: newD.sosUid, isMine: false };
          updateSOSBanner();
          playSOSAlert();
          if (Notification.permission === 'granted') {
            new Notification('🆘 SOS!', { body: `${newD.sosName || '?'} צריך/ה עזרה!`, icon: './icon.svg' });
          }
        } else if (!newD.sosActive && prevData?.sosActive && prevData?.sosUid !== me?.uid) {
          delete activeSosBanners[bannerKey];
          updateSOSBanner();
        }
      }
      renderGroupTab();
      // Re-subscribe locations when member list changes (new member added)
      subLocations();
    })
  );
  unsubGrp = () => unsubFns.forEach(fn => fn());
}

async function togglePermFor(gid, targetUid, allow) {
  const gd = allGroupsData[gid] || {};
  const perms = gd.permissions || {};
  const allOthers = (gd.members || []).filter(u => u !== me.uid);

  else { const i = myList.indexOf(targetUid); if (i > -1) myList.splice(i,1); }
  await db.collection('groups').doc(gid).update({ [`permissions.${me.uid}`]: myList });
}

async function togglePerm(targetUid, allow, gid) {

  else { const i = myList.indexOf(targetUid); if (i > -1) myList.splice(i,1); }

  });

// Opens permissions modal — any user for themselves, admin for anyone
function openMemberPermissions(targetUid, gid) {
  const tGid = gid || groupId;
  const tGd = allGroupsData[tGid] || groupData || {};
  const isSelf = targetUid === me?.uid;
  if (!isSelf && tGd.adminUid !== me?.uid) return;
  const perms = tGd.permissions || {};
  const rawPerms = perms[targetUid];
  const targetName = (targetUid === me?.uid ? myProfile?.name : null) || members[targetUid]?.name || targetUid.slice(0,8);
  const others = (tGd.members || []).filter(u => u !== targetUid);
  const rows = others.map(uid => {
    const m = members[uid] || {};
    const name = (uid === me?.uid ? myProfile?.name : null) || m.name || uid.slice(0,8);
    const photo = uid === me?.uid ? myProfile?.photoBase64 : m.photoBase64;
    const avHtml = photo
      ? `<img src="${photo}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0">`
      : `<div style="width:36px;height:36px;border-radius:50%;background:${colorForUid(uid)};display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0">${initials(name)}</div>`;
    const checked = !rawPerms || rawPerms.length === 0 || rawPerms.includes(uid);
    const onchange = isSelf
      ? `onchange="togglePerm('${uid}',this.checked,'${tGid}')"`
      : `onchange="togglePermAdmin('${targetUid}','${uid}',this.checked,'${tGid}')"`;
    return `<div class="perm-row">
      ${avHtml}
      <span class="perm-name">${esc(name)}</span>
      <label class="sw">
        <input type="checkbox" ${checked?'checked':''} ${onchange}>
        <span class="sw-sl"></span>
      </label>
    </div>`;
  }).join('');
  openModal(`
    <div class="mttl">🔒 ${esc(targetName)}</div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:14px">${t('permDesc')}</p>
    ${rows || '<div style="text-align:center;padding:12px;color:var(--text2)">–</div>'}
    <button class="btn btn-s mt16" onclick="closeModal()">${t('cancel')}</button>
  `);
}

async function togglePermAdmin(targetUid, viewerUid, allow, gid) {
  const tGid = gid || groupId;
  const tGd = allGroupsData[tGid] || groupData || {};
  const perms = tGd.permissions || {};
  const allOthers = (tGd.members || []).filter(u => u !== targetUid);
  const list = perms[targetUid] ? [...perms[targetUid]] : [...allOthers];
  if (allow) { if (!list.includes(viewerUid)) list.push(viewerUid); }
  else { const i = list.indexOf(viewerUid); if (i > -1) list.splice(i,1); }
  await db.collection('groups').doc(tGid).update({ [`permissions.${targetUid}`]: list });
}

// ══════════════════════════════════════════════
//  LOCATION TRACKING
// ══════════════════════════════════════════════
function startTracking() {
  if (!navigator.geolocation) { showToast(t('noGps'),'err'); return; }
  const opts = { enableHighAccuracy: true, maximumAge: 10000, timeout: 20000 };
  watchId = navigator.geolocation.watchPosition(onPosition, onPosErr, opts);
  // Interval push every 30s
  locInterval = setInterval(() => {
    if (myLat) pushLocation(myLat, myLng, currentMotion);
  }, LOCATION_UPDATE_MS);
  // Background: when tab is hidden, poll every 60s via geolocation
  document.addEventListener('visibilitychange', onVisibilityChange);
}

function onVisibilityChange() {
  if (document.hidden) {
    // App went to background — start 60s polling
    bgInterval = setInterval(() => {
      navigator.geolocation.getCurrentPosition(onPosition, onPosErr,
        { enableHighAccuracy: false, maximumAge: 30000, timeout: 15000 });
    }, 60000);
  } else {
    // App came to foreground — stop bg polling, watchPosition resumes
    if (bgInterval) { clearInterval(bgInterval); bgInterval = null; }
  }
}

function stopTracking() {
  if (watchId) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  if (locInterval) { clearInterval(locInterval); locInterval = null; }
  if (bgInterval)  { clearInterval(bgInterval); bgInterval = null; }
  document.removeEventListener('visibilitychange', onVisibilityChange);
}

function onPosition(pos) {
  const newLat = pos.coords.latitude;
  const newLng = pos.coords.longitude;
  const speed  = pos.coords.speed; // m/s or null

  currentMotion = detectMotion(speed);

  // Speed alert
  if (speed && speed > SPEED_ALERT_MS) notifySpeedAlert(speed);

  if (myLat !== null) updateMetrics(newLat, newLng, currentMotion);

  myLat = newLat;
  myLng = newLng;

  if (!isHidden) pushLocation(myLat, myLng, currentMotion);
  updateMyMarker(myLat, myLng, pos.coords.accuracy);
  checkGeofencing(myLat, myLng);
}

function detectMotion(speed) {
  if (speed === null || speed === undefined || speed < 0) return null;
  if (speed < 0.5)  return 'still';
  if (speed < 1.5)  return 'walking';   // < ~5.4 km/h
  if (speed < 7.0)  return 'cycling';   // < ~25 km/h
  return 'driving';
}

function onPosErr(err) {
  console.warn('GPS error:', err.message);
}

async function pushLocation(lat, lng, motion) {
  if (!me || !groupId) return;
  // Quiet mode: round coordinates to ~100m precision
  const pLat = isQuiet ? Math.round(lat * 1000) / 1000 : lat;
  const pLng = isQuiet ? Math.round(lng * 1000) / 1000 : lng;
  const payload = {
    lat: pLat, lng: pLng, uid: me.uid, groupId,
    name: myProfile?.name || me.email,
    hidden: isHidden, quiet: isQuiet, motion: motion || null,
    status: myStatus || null,
    battery: getBatteryPct(),
    photoBase64: myProfile?.photoBase64 || null,
    ts: firebase.firestore.FieldValue.serverTimestamp()
  };
  try {
    await db.collection('locations').doc(me.uid).set(payload);
    // Cache locally for offline fallback
    cacheMembers();
  } catch(e) { /* fail silently */ }
}

function subLocations() {
  // Unsub all previous per-UID listeners
  locationUnsubs.forEach(fn => fn());
  locationUnsubs = [];

  // Collect every member UID from every group the user belongs to
  const allUids = new Set();
  Object.values(allGroupsData).forEach(gd => {
    (gd.members || []).forEach(uid => allUids.add(uid));
  });
  allUids.delete(me.uid); // own location handled by pushLocation/myMarker

  allUids.forEach(uid => {
    const unsub = db.collection('locations').doc(uid).onSnapshot(doc => {
      if (!doc.exists) {
        delete members[uid];
        if (memberMarkers[uid] && mapObj) { mapObj.removeLayer(memberMarkers[uid]); delete memberMarkers[uid]; }
        updateMembersOverlay();
        return;
      }
      const data = doc.data();
      members[uid] = data;
      updateMemberMarker(uid, data);
      updateMembersOverlay();
    });
    locationUnsubs.push(unsub);
  });

  unsubLocs = () => { locationUnsubs.forEach(fn => fn()); locationUnsubs = []; };
}

function updateMemberMarker(uid, data) {
  if (!mapObj) return;

  // Permission check — use whichever group data this member belongs to
  const memberGd = Object.values(allGroupsData).find(gd => (gd.members||[]).includes(uid)) || groupData || {};
  const perms = memberGd.permissions || {};
  const whoCanSeeUid = perms[uid];
  const canSee = !whoCanSeeUid || whoCanSeeUid.length === 0 || whoCanSeeUid.includes(me.uid);

  if (!data.lat || data.hidden || !canSee) {
    if (memberMarkers[uid]) { mapObj.removeLayer(memberMarkers[uid]); delete memberMarkers[uid]; }
    return;
  }

  if (focusedMember && focusedMember !== uid) {
    if (memberMarkers[uid]) { mapObj.removeLayer(memberMarkers[uid]); delete memberMarkers[uid]; }
    return;
  }

  if (mapGroupFilter) {
    const inGroup = (allGroupsData[mapGroupFilter]?.members || []).includes(uid);
    if (!inGroup) {
      if (memberMarkers[uid]) { mapObj.removeLayer(memberMarkers[uid]); delete memberMarkers[uid]; }
      return;
    }
  }

  const color = colorForUid(uid);
  const name = data.name || uid.slice(0,6);
  const motion = data.motion || null;
  const motionEmoji = motion && MOTION_EMOJI[motion] ? MOTION_EMOJI[motion] : '';

  // ── Cluster spread: collect all visible members near this point ──
  const CLUSTER_DIST = 30; // meters
  const allVisible = Object.entries(members).filter(([id, d]) => {
    if (id === uid) return false;
    if (!d.lat || d.hidden) return false;
    return haversine(data.lat, data.lng, d.lat, d.lng) < CLUSTER_DIST;
  });

  let lat = data.lat, lng = data.lng;
  if (allVisible.length > 0) {
    // Assign a stable index based on uid sort order among clustered members
    const cluster = [...allVisible.map(([id]) => id), uid].sort();
    const idx = cluster.indexOf(uid);
    const total = cluster.length;
    const SPREAD = 0.000036; // ~4m spread radius
    const angle = (idx / total) * 2 * Math.PI - Math.PI / 2;
    lat = data.lat + SPREAD * Math.cos(angle);
    lng = data.lng + SPREAD * Math.sin(angle);
  }

  const isMoving = motion && motion !== 'still';
  const movingClass = isMoving ? ' moving' : '';
  const statusOpt = data.status ? STATUS_OPTIONS.find(s => s.key === data.status) : null;
  const statusEmoji = statusOpt ? statusOpt.emoji : '';
  const statusBadge = statusEmoji ? `<div class="status-badge">${statusEmoji}</div>` : '';
  const motionBadge = motionEmoji ? `<div class="mm-motion">${motionEmoji}</div>` : '';
  const photo = data.photoBase64;
  const memberInner = photo
    ? `<img class="mm-photo" src="${photo}">${motionBadge}${statusBadge}`
    : `${initials(name)}${motionBadge}${statusBadge}`;
  const icon = L.divIcon({
    className:'', iconSize:[44,44], iconAnchor:[22,22],
    html:`<div class="mm${movingClass}" style="background:${color}">${memberInner}</div>`
  });
  const ts = data.ts?.toDate ? data.ts.toDate() : null;
  const MOTION_TR = {still:'motionStill',walking:'motionWalk',cycling:'motionCycle',driving:'motionDrive'};
  const motionLabel = motion ? ` · ${t(MOTION_TR[motion])||motion}` : '';
  const battPct = (data.battery !== null && data.battery !== undefined) ? ` · 🔋${data.battery}%` : '';
  // ETA to nearest point when moving
  const motionSpeeds = { walking:1.4, cycling:4.2, driving:13.9 };
  let etaStr = '';
  if (isMoving && points.length) {
    const spd = motionSpeeds[motion] || 0;
    const nearestPt = points.reduce((best, p) => {
      const d = haversine(data.lat, data.lng, p.lat, p.lng);
      return (!best || d < best.dist) ? {pt:p, dist:d} : best;
    }, null);
    if (nearestPt && nearestPt.dist > 50 && nearestPt.dist < 5000 && spd > 0) {
      const mins = Math.round(nearestPt.dist / spd / 60);
      if (mins >= 1 && mins <= 120) etaStr = `<br><span class="eta-chip">→ ${esc(nearestPt.pt.name)} ~${mins} ${t('logMins')}</span>`;
    }
  }
  const popup = `<b>${esc(name)}</b>${motionLabel}${battPct}<br><small>${ts ? t('lastSeen')+': '+relativeTime(ts) : ''}</small>${etaStr}`;

  if (!memberMarkers[uid]) {
    memberMarkers[uid] = L.marker([lat,lng],{icon}).addTo(mapObj).bindPopup(popup);
  } else {
    memberMarkers[uid].setLatLng([lat,lng]);
    memberMarkers[uid].setIcon(icon);
    memberMarkers[uid].setPopupContent(popup);
  }
}

// ══════════════════════════════════════════════
//  GEOFENCING
// ══════════════════════════════════════════════
function checkGeofencing(lat, lng) {
  points.forEach(p => {
    const dist = haversine(lat, lng, p.lat, p.lng);
    if (dist <= p.radius && !arrivedSet.has(p.id)) {
      arrivedSet.add(p.id);
      sendArrivalNotif(p.name);
      notifyAdminArrival(p.name, lat, lng);
      // Save to group notifications history
      const memberName = myProfile?.name || me?.email || '?';
      saveGroupNotification('arrival', memberName, `📍 ${memberName} — ${t('arriveAt')}: ${p.name}`, null);
      // Broadcast to all group members via groupEvents subcollection
      if (groupId) {
        db.collection('groups').doc(groupId).collection('groupEvents').add({
          type: 'arrival', uid: me.uid, name: memberName, pointName: p.name,
          ts: firebase.firestore.FieldValue.serverTimestamp()
        }).catch(()=>{});
      }
    } else if (dist > p.radius * 1.5 && arrivedSet.has(p.id)) {
      arrivedSet.delete(p.id);
    }
  });
}

// Send arrival notification to admin via Firestore (admin client listens)
async function notifyAdminArrival(pointName, lat, lng) {
  if (!me || !groupId || !groupData) return;
  const adminUid = groupData.adminUid;
  if (!adminUid || adminUid === me.uid) return; // don't notify if I AM the admin
  const memberName = myProfile?.name || me.email;
  try {
    await db.collection('adminNotifs').add({
      groupId, adminUid,
      type: 'arrival',
      memberUid: me.uid,
      memberName,
      pointName,
      lat, lng,
      ts: firebase.firestore.FieldValue.serverTimestamp(),
      seen: false
    });
  } catch(e) { /* fail silently */ }
}

// Admin listens to arrival notifications
let unsubAdminNotifs = null;
function subAdminNotifications() {
  if (!me || !groupId) return;
  if (unsubAdminNotifs) { unsubAdminNotifs(); unsubAdminNotifs = null; }
  const isAdmin = groupData?.adminUid === me.uid;
  if (!isAdmin) return;
  // Listen for new unseen notifications for me as admin
  unsubAdminNotifs = db.collection('adminNotifs')
    .where('adminUid','==',me.uid)
    .where('groupId','==',groupId)
    .where('seen','==',false)
    .onSnapshot(snap => {
      snap.docs.forEach(doc => {
        const n = doc.data();
        const ts = n.ts?.toDate ? n.ts.toDate() : new Date();
        // Only show notifications from last 5 minutes
        if (Date.now() - ts.getTime() < 300000) {
          const msg = `📍 ${n.memberName} ${t('arriveAt')}: ${n.pointName}`;
          showToastLong(msg, 'ok');
          if (notifEnabled && Notification.permission === 'granted') {
            new Notification('📍 Family Location', {
              body: msg,
              icon: 'icons/icon-192.png',
              vibrate: [200, 100, 200]
            });
          }
        }
        // Mark as seen
        doc.ref.update({ seen: true }).catch(()=>{});
      });
    });
}

function sendArrivalNotif(name) {
  if (!notifEnabled) return;
  const msg = `${t('arriveAt')}: ${name}`;
  showToastLong('📍 '+msg,'ok');
  if (Notification.permission === 'granted') {
    new Notification('📍 Family Location', { body: msg, icon: 'icons/icon.svg' });
  }
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function previewProfilePhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = 80;
      const ctx = canvas.getContext('2d');
      const size = Math.min(img.width, img.height);
      const sx = (img.width - size) / 2, sy = (img.height - size) / 2;
      ctx.drawImage(img, sx, sy, size, size, 0, 0, 80, 80);
      const base64 = canvas.toDataURL('image/jpeg', 0.6);
      const preview = document.getElementById('photoPreview');
      if (preview) {
        const newImg = document.createElement('img');
        newImg.src = base64;
        newImg.style.cssText = 'width:72px;height:72px;border-radius:50%;object-fit:cover;display:block;margin:0 auto 10px';
        newImg.id = 'photoPreview';
        preview.replaceWith(newImg);
      }
      input.dataset.base64 = base64;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

    unreadChat = 0;

    if (el) setTimeout(() => el.scrollTop = el.scrollHeight, 100);

  if (name === 'group') renderGroupTab();

      metricsRefreshInterval = setInterval(loadLocationLog, 120000);
    }
  } else {
    if (metricsRefreshInterval) { clearInterval(metricsRefreshInterval); metricsRefreshInterval = null; }
  }
  if (name === 'settings') renderSettings();

  // Push history state for Android back button (skip if called from popstate handler)
  if (_tabNavPush && name !== _currentTab) {
    history.pushState({ tab: name }, '');
  }
  _currentTab = name;
}

// Android back button: go to previous tab, not exit app
window.addEventListener('popstate', e => {
  const modal = document.getElementById('modal');
  if (modal && !modal.hidden) { closeModal(); return; }
  if (e.state?.tab) {
    _tabNavPush = false;
    switchTab(e.state.tab);
    _tabNavPush = true;
  } else if (_currentTab !== 'map') {
    _tabNavPush = false;
    switchTab('map');
    _tabNavPush = true;
    history.pushState({ tab: 'map' }, '');
  }
  // If already on map — let browser handle (shows exit prompt on Android)
});

function relativeTime(date) {
  if (!date) return '';
  const diff = Math.floor((Date.now() - date.getTime()) / 1000);
  if (diff < 60) return t('now');
  const m = Math.floor(diff/60);
  if (m < 60) return `${m} ${t('minsAgo')}`;
  return date.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

let deferredInstallPrompt = null;
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent.toLowerCase());
const isInStandaloneMode = window.matchMedia('(display-mode: standalone)').matches
  || window.navigator.standalone === true;

function initInstallPrompt() {
  if (isInStandaloneMode) { updateInstallUI(); return; }
  if (isIOS) {
    if (!localStorage.getItem('fl_dismissed')) setTimeout(showIOSInstall, 4000);
    updateInstallUI(); return;
  }
  // Listen for Chrome's ready signal — only then show the banner
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredInstallPrompt = e;
    updateInstallUI();
    if (!localStorage.getItem('fl_dismissed')) {
      setTimeout(() => {
        const b = document.getElementById('installBanner');
        if (b) b.style.display = 'flex';
      }, 1000);
    }
  });
  window.addEventListener('appinstalled', () => {
    const b = document.getElementById('installBanner');
    if (b) b.style.display = 'none';
    deferredInstallPrompt = null;
    updateInstallUI();
    showToast('✅ ' + t('sInstalled'));
  });
  updateInstallUI();
}

function updateInstallUI() {
  const elAlways  = document.getElementById('siInstallAlways');
  const elDone    = document.getElementById('siInstalled');
  if (!elAlways) return;
  setText('sInstLbl','sInst');
  setText('sInstalled','sInstalled');
  if (isInStandaloneMode) {
    elAlways.style.display = 'none';
    elDone.style.display = 'flex';
  } else {
    elAlways.style.display = 'flex';
    elDone.style.display = 'none';
  }
}

// Called from both settings button and banner
async function doInstall() {
  if (deferredInstallPrompt) {
    try {
      deferredInstallPrompt.prompt();
      const { outcome } = await deferredInstallPrompt.userChoice;
      if (outcome === 'accepted') {
        deferredInstallPrompt = null;
        const b = document.getElementById('installBanner');
        if (b) b.style.display = 'none';
        updateInstallUI();
      }
    } catch(e) {}
  } else if (isIOS) {
    showIOSInstall();
  } else if (isInStandaloneMode) {
    showToast('✅ ' + t('sInstalled'));
  } else {
    // Chrome hasn't offered the prompt yet — clear any previous dismissal so
    // the banner auto-appears as soon as Chrome decides the app is installable
    localStorage.removeItem('fl_dismissed');
    showToast('📲 Chrome יציע התקנה בקרוב — נסה שוב עוד רגע', '', 5000);
  }
}
function doInstallPWA() { doInstall(); }
function doInstallOrHelp() { doInstall(); }

// ══════════════════════════════════════════════
//  METRICS + LOG + ROUTE
// ══════════════════════════════════════════════
const STEPS_PER_KM  = 1300;
const STAY_DIST_M   = 50;   // consider "staying" if moved <50m
const STAY_MIN_MS   = 30 * 60 * 1000; // 30 minutes
let stayCandidate   = null; // {lat, lng, startTs, motion}
let activeRoute     = null; // L.layerGroup on map
let trackPoints     = [];   // [{lat,lng,ts,motion}] for today

async function updateMetrics(lat, lng, motion) {
  if (!me || !groupId) return;
  const now = Date.now();
  const today = new Date().toISOString().slice(0,10);

  // ── Track point for daily route ──
  trackPoints.push({ lat, lng, ts: now, motion: motion||'still' });
  // Save track every 2 points to Firestore (batch)
  if (trackPoints.length % 2 === 0) {
    const docId = `${groupId}_${me.uid}_${today}`;
    db.collection('tracks').doc(docId).set({
      uid: me.uid, groupId, date: today,
      name: myProfile?.name || me.email,
      points: firebase.firestore.FieldValue.arrayUnion(...trackPoints.slice(-5).map(p => ({
        lat: p.lat, lng: p.lng, ts: p.ts, motion: p.motion
      })))
    }, {merge: true}).catch(()=>{});
  }

  // ── Stay detection for log ──
  if (!stayCandidate) {
    stayCandidate = { lat, lng, startTs: now, motion };
  } else {
    const moved = haversine(stayCandidate.lat, stayCandidate.lng, lat, lng);
    if (moved > STAY_DIST_M) {
      // User moved — check if previous stay was long enough
      const duration = now - stayCandidate.startTs;
      if (duration >= STAY_MIN_MS) {
        saveLocationLog(stayCandidate.lat, stayCandidate.lng, stayCandidate.startTs, now);
      }
      stayCandidate = { lat, lng, startTs: now, motion };
    }
  }

  // ── Distance metrics ──
  if (!lastMetricPos) { lastMetricPos = {lat, lng}; return; }
  const dist = haversine(lastMetricPos.lat, lastMetricPos.lng, lat, lng);
  if (dist < 8) return;
  lastMetricPos = {lat, lng};
  const distKm = dist / 1000;
  const steps = motion === 'walking' ? Math.round(distKm * STEPS_PER_KM) : 0;
  try {
    await db.collection('metrics').doc(`${groupId}_${me.uid}_${today}`).set({
      uid: me.uid, groupId, date: today,
      name: myProfile?.name || me.email,
      distance: firebase.firestore.FieldValue.increment(distKm),
      steps: firebase.firestore.FieldValue.increment(steps),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, {merge: true});
  } catch(e) { /* fail silently */ }
}

async function saveLocationLog(lat, lng, startTs, endTs) {
  const today = new Date().toISOString().slice(0,10);
  const durationMin = Math.round((endTs - startTs) / 60000);
  // Reverse geocode via Nominatim (OSM)
  let address = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`, {
      headers: {'Accept-Language': lang}
    });
    if (r.ok) {
      const j = await r.json();
      address = j.display_name?.split(',').slice(0,3).join(', ') || address;
    }
  } catch(e) {}
  const entry = { lat, lng, address, startTs, endTs, durationMin, date: today };
  db.collection('locationLog').add({
    uid: me.uid, groupId, name: myProfile?.name || me.email,
    ...entry, createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).catch(()=>{});
}
