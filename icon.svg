<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#0b3d91"/>
    </linearGradient>
    <linearGradient id="pin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8f0fe"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle outer pulse ring -->
  <circle cx="256" cy="214" r="158" fill="none" stroke="white" stroke-width="10" opacity="0.10"/>
  <circle cx="256" cy="214" r="198" fill="none" stroke="white" stroke-width="6" opacity="0.05"/>

  <!-- Location pin teardrop -->
  <path d="M256 64 C172 64 104 132 104 216 C104 326 256 456 256 456 C256 456 408 326 408 216 C408 132 340 64 256 64Z"
    fill="url(#pin)"/>

  <!-- Inner filled circle (blue) -->
  <circle cx="256" cy="208" r="66" fill="#1a73e8"/>

  <!-- Family member dots: 2 adults + 1 child -->
  <circle cx="234" cy="193" r="15" fill="white"/>
  <circle cx="278" cy="193" r="15" fill="white"/>
  <circle cx="256" cy="228" r="12" fill="rgba(255,255,255,0.92)"/>

  <!-- Connecting line between adults (family bond) -->
  <line x1="234" y1="193" x2="278" y2="193" stroke="rgba(255,255,255,0.35)" stroke-width="4" stroke-linecap="round"/>
</svg>
